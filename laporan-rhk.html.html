<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generator Laporan RHK — PKH Kec. Banyuates</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#f0f2f5;--card:#fff;--accent:#1a5276;--accent2:#2e86c1;--accent-light:#ebf5fb;--text:#2c3e50;--text2:#5d6d7e;--border:#d5dbdb;--success:#27ae60;--warning:#e67e22;--radius:10px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.header{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;padding:20px 24px;text-align:center}
.header h1{font-size:20px;font-weight:800;letter-spacing:-.4px}
.header p{font-size:12px;opacity:.85;margin-top:3px}
.container{max-width:880px;margin:20px auto;padding:0 12px}
.card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);padding:20px;margin-bottom:14px}
.card-title{font-size:14px;font-weight:700;color:var(--accent);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.card-title .num{background:var(--accent);color:#fff;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.row{display:flex;gap:10px;flex-wrap:wrap}
.col{flex:1;min-width:160px}
label{display:block;font-size:11px;font-weight:600;color:var(--text2);margin-bottom:3px;text-transform:uppercase;letter-spacing:.4px}
select,input[type="text"]{width:100%;padding:9px 10px;border:1.5px solid var(--border);border-radius:7px;font-family:inherit;font-size:13px;background:#fafbfc;transition:border .2s}
select:focus,input:focus,textarea:focus{outline:none;border-color:var(--accent2);background:#fff}
textarea{width:100%;padding:9px 10px;border:1.5px solid var(--border);border-radius:7px;font-family:inherit;font-size:12px;line-height:1.5;resize:vertical;min-height:90px;background:#fafbfc}
.report-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden;transition:box-shadow .2s}
.report-card:hover{box-shadow:0 2px 12px rgba(0,0,0,.06)}
.report-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;cursor:pointer;user-select:none;gap:10px}
.report-header:hover{background:#fafbfc}
.report-tag{background:var(--accent);color:#fff;font-size:10px;font-weight:700;padding:3px 8px;border-radius:5px;white-space:nowrap;flex-shrink:0}
.report-name{flex:1;font-size:13px;font-weight:600;color:var(--text);line-height:1.3}
.report-chevron{font-size:10px;color:var(--text2);transition:transform .2s;flex-shrink:0}
.report-chevron.open{transform:rotate(180deg)}
.report-body{display:none;padding:0 16px 16px;border-top:1px solid #eee}
.report-body.show{display:block}
.rhk4-edit{background:var(--accent-light);border:1px solid #aed6f1;border-radius:8px;padding:12px;margin:10px 0}
.rhk4-edit h4{font-size:12px;font-weight:700;color:var(--accent);margin-bottom:6px}
.foto-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin:10px 0}
.foto-slot{aspect-ratio:4/3;border:2px dashed #ccc;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:10px;color:#999;cursor:pointer;overflow:hidden;position:relative;background:#fafafa}
.foto-slot img{width:100%;height:100%;object-fit:cover}
.foto-slot.filled{border-style:solid;border-color:var(--success)}
.foto-slot .rm{position:absolute;top:2px;right:2px;background:rgba(231,76,60,.9);color:#fff;border:none;border-radius:50%;width:16px;height:16px;font-size:10px;cursor:pointer;display:none;align-items:center;justify-content:center}
.foto-slot.filled:hover .rm{display:flex}
.btn-gen{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;border-radius:7px;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;transition:transform .15s,box-shadow .15s}
.btn-gen:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(26,82,118,.25)}
.btn-gen:active{transform:translateY(0)}
.btn-gen:disabled{background:#bbb;cursor:not-allowed;transform:none;box-shadow:none}
.btn-gen.done{background:var(--success)}
.status-msg{font-size:12px;color:var(--text2);margin-top:6px;text-align:center;min-height:16px}
.progress-bar{width:100%;height:6px;background:#e8e8e8;border-radius:3px;overflow:hidden;margin-top:8px;display:none}
.progress-bar .fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--success));border-radius:3px;transition:width .3s;width:0%}
.check-all-wrap{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap}
.check-all-wrap label{margin:0;text-transform:none;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px}
input[type="checkbox"]{width:16px;height:16px;accent-color:var(--accent)}
.footer-info{text-align:center;font-size:11px;color:#999;padding:16px 0 32px}
.foto-label{font-size:11px;font-weight:600;color:var(--text2);margin-top:10px}
.rhk-group{font-size:12px;font-weight:700;color:var(--accent);padding:10px 0 4px;border-bottom:1px dashed var(--border);margin-bottom:6px}
</style>
</head>

<div class="header">
<h1>Generator Laporan RHK &mdash; PKH</h1>

<div class="col"><label>Tahun</label><select id="inputTahun"><option selected>2025</option><option>2026</option><option>2027</option></select></div>

</div>
<div class="card">

<div class="check-all-wrap">
<label><input type="checkbox" id="checkAll" onchange="toggleCheckAll(this.checked)"> Pilih semua</label>
<button class="btn-gen" id="btnBatch" onclick="generateBatch()" style="padding:8px 20px;font-size:13px" disabled>&#128230; Generate yang dipilih</button>
</div>
<div class="progress-bar" id="batchBar"><div class="fill" id="batchFill"></div></div>
<div class="status-msg" id="batchStatus"></div>
<div id="reportList"></div>
</div>
</div>

var REPORTS=[{"rhk_no": 1, "rhk_title": "Terlaksananya penyaluran bansos kepada Keluarga Penerima Manfaat (KPM ) PKH tepat sasaran dan tepat  jumlah", "ra_index": 1, "ra_title": "Melakukan edukasi dan sosialisasi pencairan secara tunai dan non tunai", "sub_title": "", "umum": "Dalam rangka meningkatkan pemahaman Keluarga Penerima Manfaat (KPM) terhadap mekanisme penyaluran bantuan sosial, baik secara tunai maupun non tunai, perlu dilakukan kegiatan edukasi dan sosialisasi. Kegiatan ini bertujuan agar KPM memahami prosedur pencairan bantuan, hak dan kewajiban penerima, serta meminimalkan kesalahan dan kendala dalam proses penyaluran bantuan sosial.", "maksud_tujuan": "Kegiatan edukasi dan sosialisasi pencairan bantuan sosial secara tunai dan non tunai ini dimaksudkan untuk memberikan pemahaman yang utuh kepada Keluarga Penerima Manfaat (KPM) mengenai mekanisme, prosedur, serta hak dan kewajiban dalam proses pencairan bantuan sosial, dengan tujuan agar KPM mampu menerima dan memanfaatkan bantuan secara tepat, aman, serta meminimalkan kendala dan kesalahan dalam pelaksanaan penyaluran bantuan di lapangan. ", "ruang_lingkup": "Ruang lingkup laporan ini meliputi pelaksanaan kegiatan edukasi dan sosialisasi pencairan bantuan sosial kepada KPM di wilayah dampingan.", "dasar": "Kegiatan ini dilaksanakan berdasarkan:\na.\tRencana Hasil Kerja (RHK) ASN PPPK Dit. PSNK mengenai edukasi dan sosialisasi pencairaan tunai dan non tunai. \nb.\tSalah satu proses bisnis PKH yang harus dilaksanakan oleh ASN PPPK Dit. PSNK\nc.\tData Keluarga Penerima Manfaat (KPM) yang bersumber dari SIKS-NG.", "kegiatan": "Kegiatan edukasi dan sosialisasi pencairan bantuan sosial secara non tunai dilaksanakan kepada Keluarga Penerima Manfaat (KPM) di wilayah dampingan melalui penyampaian materi secara langsung. Dalam kegiatan ini, pendamping memberikan penjelasan mengenai mekanisme pencairan bantuan sosial menggunakan Kartu Keluarga Sejahtera (KKS), ATM, dan agen penyalur, termasuk tahapan yang harus dilakukan oleh KPM. Selain itu, disampaikan pula langkah antisipasi terhadap permasalahan yang sering terjadi saat pencairan bantuan, serta edukasi mengenai pencegahan penyalahgunaan bantuan sosial dan pentingnya perlindungan data pribadi KPM. Kegiatan berlangsung secara interaktif melalui diskusi dan tanya jawab untuk memastikan KPM memahami materi yang disampaikan dan dapat menerapkannya dalam proses pencairan bantuan sosial.", "hasil": "1.\tKeluarga Penerima Manfaat (KPM) memahami mekanisme pencairan bantuan sosial secara non tunai melalui Kartu Keluarga Sejahtera (KKS), ATM, dan agen penyalur sesuai ketentuan yang berlaku.\n2.\tKPM mengetahui langkah antisipasi terhadap permasalahan yang sering terjadi saat pencairan bantuan, seperti kendala kartu, saldo, maupun akses layanan penyalur.\n3.\tMeningkatnya kesadaran KPM terhadap pentingnya pencegahan penyalahgunaan bantuan sosial serta perlindungan data pribadi, termasuk menjaga kerahasiaan KKS, PIN, dan identitas diri.\n4.\tTerbangunnya pemahaman KPM untuk bersikap lebih mandiri, waspada, dan tertib dalam proses pencairan bantuan sosial.", "simpulan": "Kegiatan edukasi dan sosialisasi pencairan bantuan sosial secara non tunai telah dilaksanakan dengan baik dan memberikan pemahaman kepada Keluarga Penerima Manfaat (KPM) mengenai mekanisme pencairan melalui KKS, ATM, dan agen penyalur. Selain itu, KPM juga memperoleh pengetahuan terkait antisipasi permasalahan pencairan serta pentingnya pencegahan penyalahgunaan bantuan sosial dan perlindungan data pribadi. Kegiatan ini diharapkan dapat mendukung kelancaran dan ketertiban penyaluran bantuan sosial di wilayah dampingan.", "saran": "Perlu dilakukan edukasi dan sosialisasi secara berkelanjutan agar pemahaman KPM semakin meningkat, terutama bagi KPM yang baru menerima bantuan atau masih mengalami kendala pencairan. Selain itu, koordinasi dengan pihak penyalur dan Ketua Kelompok PKH perlu terus ditingkatkan guna mempercepat penanganan permasalahan pencairan bantuan sosial di lapangan.", "penutup": "Demikian laporan kegiatan edukasi dan sosialisasi pencairan bantuan sosial secara non tunai ini disusun sebagai bentuk pertanggungjawaban pelaksanaan tugas. Diharapkan hasil kegiatan ini dapat memberikan manfaat nyata bagi KPM serta mendukung optimalisasi penyaluran bantuan sosial sesuai ketentuan yang berlaku.", "editable_kegiatan": false}, {"rhk_no": 1, "rhk_title": "Terlaksananya penyaluran bansos kepada Keluarga Penerima Manfaat (KPM ) PKH tepat sasaran dan tepat  jumlah", "ra_index": 2, "ra_title": "Melaksanakan Supervisi Permasalahan Bantuan Sosial", "sub_title": "", "umum": "Dalam pelaksanaan penyaluran bantuan sosial di lapangan, masih ditemui berbagai permasalahan yang dialami oleh Keluarga Penerima Manfaat (KPM), baik yang berkaitan dengan data, pencairan, maupun pemanfaatan bantuan. Untuk memastikan bantuan sosial tepat sasaran dan sesuai ketentuan, diperlukan kegiatan supervisi sebagai bentuk pengawasan, pendampingan, serta upaya penyelesaian permasalahan yang muncul di tingkat wilayah dampingan.", "maksud_tujuan": "Kegiatan supervisi permasalahan bantuan sosial ini dimaksudkan untuk melakukan pemantauan dan penelusuran langsung terhadap berbagai kendala yang dihadapi KPM, sekaligus memberikan pendampingan dan solusi sesuai ketentuan yang berlaku. Tujuan dari kegiatan ini adalah agar permasalahan bantuan sosial dapat ditangani secara tepat, data penerima bantuan menjadi lebih valid, serta penyaluran bantuan berjalan lebih tertib, transparan, dan akuntabel.", "ruang_lingkup": "Ruang lingkup laporan ini meliputi pelaksanaan kegiatan supervisi terhadap permasalahan bantuan sosial yang terjadi pada KPM di wilayah dampingan.", "dasar": "Kegiatan ini dilaksanakan berdasarkan:\na.\tRencana Hasil Kerja (RHK) ASN PPPK Dit. PSNK mengenai supervisi dan penanganan permasalahan bantuan sosial.\nb.\tSalah satu proses bisnis PKH yang harus dilaksanakan oleh ASN PPPK Dit. PSNK\nc.\tData Keluarga Penerima Manfaat (KPM) yang bersumber dari SIKS-NG.", "kegiatan": "Kegiatan supervisi permasalahan bantuan sosial dilaksanakan melalui kunjungan dan pemantauan langsung di wilayah dampingan. Dalam kegiatan ini dilakukan identifikasi terhadap berbagai kendala yang dihadapi KPM, seperti permasalahan data kepesertaan, status bantuan, kendala pencairan, hingga kesesuaian pemanfaatan bantuan. Selain itu, dilakukan klarifikasi kepada KPM dan pihak terkait guna memperoleh informasi yang akurat, serta diberikan penjelasan dan pendampingan sesuai dengan ketentuan program bantuan sosial. Hasil supervisi kemudian dicatat sebagai bahan tindak lanjut dan koordinasi dengan pihak terkait untuk penyelesaian permasalahan yang ditemukan.", "hasil": "1. Teridentifikasinya berbagai permasalahan bantuan sosial yang dialami oleh KPM di wilayah dampingan secara lebih jelas dan terperinci.\n\n2. KPM memperoleh penjelasan dan pendampingan terkait permasalahan yang dihadapi, sehingga memahami langkah-langkah yang perlu dilakukan.\n\n3. Tersusunnya bahan tindak lanjut dan rekomendasi penyelesaian permasalahan bantuan sosial sesuai ketentuan yang berlaku.\n\n4. Meningkatnya ketertiban dan pemahaman KPM dalam menerima serta memanfaatkan bantuan sosial.", "simpulan": "Kegiatan supervisi permasalahan bantuan sosial telah dilaksanakan dengan baik dan memberikan gambaran nyata mengenai kondisi serta kendala yang dihadapi KPM di wilayah dampingan. Melalui kegiatan ini, permasalahan dapat diidentifikasi secara langsung, KPM memperoleh pendampingan yang diperlukan, serta terbangun koordinasi untuk tindak lanjut penyelesaian permasalahan bantuan sosial.", "saran": "Perlu dilakukan kegiatan supervisi secara rutin dan berkelanjutan agar permasalahan bantuan sosial dapat terdeteksi lebih dini. Selain itu, koordinasi dengan pemerintah desa/kelurahan serta pihak terkait perlu terus ditingkatkan guna mempercepat proses penyelesaian permasalahan yang dihadapi KPM.", "penutup": "Demikian laporan kegiatan supervisi permasalahan bantuan sosial ini disusun sebagai bentuk pertanggungjawaban pelaksanaan tugas. Diharapkan kegiatan ini dapat memberikan manfaat bagi KPM serta mendukung penyaluran bantuan sosial yang lebih tepat sasaran dan sesuai ketentuan.", "editable_kegiatan": false}, {"rhk_no": 1, "rhk_title": "Terlaksananya penyaluran bansos kepada Keluarga Penerima Manfaat (KPM ) PKH tepat sasaran dan tepat  jumlah", "ra_index": 3, "ra_title": "Melaksanakan Monitoring/Pemantauan Penyaluran Bantuan Sosial", "sub_title": "", "umum": "Dalam rangka memastikan penyaluran bantuan sosial berjalan sesuai dengan ketentuan yang berlaku, tepat sasaran, tepat waktu, dan tepat jumlah, perlu dilaksanakan kegiatan monitoring/pemantauan penyaluran bantuan sosial di wilayah dampingan. Kegiatan ini dilakukan untuk mengetahui kondisi penyaluran di lapangan serta mengidentifikasi permasalahan yang dihadapi oleh Keluarga Penerima Manfaat (KPM).", "maksud_tujuan": "Kegiatan monitoring/pemantauan penyaluran bantuan sosial ini dimaksudkan untuk memantau pelaksanaan penyaluran bantuan sosial kepada KPM. Adapun tujuannya adalah untuk memastikan bantuan diterima oleh KPM sesuai ketentuan, mengidentifikasi kendala penyaluran, serta sebagai bahan evaluasi dan tindak lanjut perbaikan penyaluran bantuan sosial.", "ruang_lingkup": "Ruang lingkup laporan ini meliputi pelaksanaan kegiatan monitoring/pemantauan penyaluran bantuan sosial kepada KPM di wilayah dampingan, baik bantuan tunai maupun non tunai.", "dasar": "Kegiatan ini dilaksanakan berdasarkan:\na.\tRencana Hasil Kerja (RHK) ASN PPPK Dit. PSNK terkait monitoring/pemantauan penyaluran bantuan sosial. \nb.\tSalah satu proses bisnis PKH yang harus dilaksanakan oleh ASN PPPK Dit. PSNK\nc.\tData Keluarga Penerima Manfaat (KPM) yang bersumber dari SIKS-NG.", "kegiatan": "Kegiatan monitoring/pemantauan penyaluran bantuan sosial dilaksanakan melalui pemantauan langsung kepada Keluarga Penerima Manfaat (KPM) di wilayah dampingan. Pemantauan dilakukan dengan melakukan pengecekan status penyaluran bantuan, wawancara singkat kepada KPM terkait penerimaan bantuan, serta koordinasi dengan pendamping, agen penyalur, dan perangkat desa setempat. Selain itu, kegiatan ini juga mencakup pengecekan kesesuaian data penerima dengan kondisi di lapangan guna memastikan bantuan sosial disalurkan tepat sasaran dan sesuai ketentuan yang berlaku.", "hasil": "1.\tDiketahui status penyaluran bantuan sosial kepada KPM di wilayah dampingan.\n2.\tMayoritas KPM telah menerima bantuan sesuai ketentuan yang berlaku.\n3.\tDitemukan beberapa kendala penyaluran, seperti masalah kartu, saldo, data kependudukan, atau akses ke agen penyalur.\n4.\tTeridentifikasinya kebutuhan tindak lanjut dan koordinasi dengan pihak terkait untuk penyelesaian permasalahan penyaluran.", "simpulan": "Kegiatan monitoring/pemantauan penyaluran bantuan sosial telah dilaksanakan dengan baik dan memberikan gambaran nyata terkait pelaksanaan penyaluran bantuan di lapangan. Kegiatan ini membantu memastikan bantuan diterima oleh KPM sesuai ketentuan serta menjadi sarana untuk mengidentifikasi permasalahan yang perlu segera ditindaklanjuti.", "saran": "Perlu dilakukan monitoring secara berkala dan berkelanjutan serta peningkatan koordinasi dengan pihak terkait agar permasalahan penyaluran bantuan sosial dapat segera ditangani dan tidak berulang.", "penutup": "Demikian laporan kegiatan monitoring/pemantauan penyaluran bantuan sosial ini disusun sebagai bentuk pertanggungjawaban pelaksanaan tugas. Diharapkan hasil kegiatan ini dapat mendukung kelancaran dan ketepatan penyaluran bantuan sosial di wilayah dampingan.", "editable_kegiatan": false}, {"rhk_no": 1, "rhk_title": "Terlaksananya penyaluran bansos kepada Keluarga Penerima Manfaat (KPM ) PKH tepat sasaran dan tepat  jumlah", "ra_index": 4, "ra_title": "Melaksanakan Penelitian penyaluran bantuan Sosial", "sub_title": "", "umum": "Dalam pelaksanaan penyaluran bantuan sosial, masih terdapat Keluarga Penerima Manfaat (KPM) yang belum melakukan transaksi bantuan sesuai periode penyaluran. Kondisi ini perlu diteliti lebih lanjut untuk mengetahui penyebab keterlambatan atau kendala yang dialami KPM, sehingga bantuan sosial yang telah disalurkan oleh pemerintah dapat benar-benar dimanfaatkan oleh penerima. Oleh karena itu, kegiatan penelitian ini dilaksanakan sebagai upaya monitoring dan evaluasi terhadap KPM yang belum melakukan transaksi bantuan sosial.", "maksud_tujuan": "Kegiatan penelitian penyaluran bantuan sosial ini dimaksudkan untuk melakukan monitoring terhadap KPM yang belum melakukan transaksi bantuan sosial. Tujuan dari kegiatan ini adalah untuk mengetahui faktor penyebab belum dilakukannya transaksi, baik yang bersifat administratif, teknis, maupun nonteknis, serta sebagai dasar dalam menentukan langkah tindak lanjut agar bantuan dapat segera dimanfaatkan oleh KPM sesuai ketentuan.", "ruang_lingkup": "Ruang lingkup laporan ini meliputi pelaksanaan penelitian dan monitoring terhadap KPM yang belum melakukan transaksi bantuan sosial di wilayah dampingan.", "dasar": "Kegiatan ini dilaksanakan berdasarkan:\na.\tRencana Hasil Kerja (RHK) ASN PPPK Dit. PSNK terkait penelitian penyaluran bantuan sosial.\nb.\tSalah satu proses bisnis PKH yang harus dilaksanakan oleh ASN PPPK Dit. PSNK\nc.\tData Keluarga Penerima Manfaat (KPM) yang bersumber dari SIKS-NG dan SIKSMA.", "kegiatan": "Kegiatan penelitian ini dilaksanakan dengan melakukan penelusuran data KPM yang belum melakukan transaksi bantuan sosial sesuai data yang masuk ke SIKSMA, kemudian dilanjutkan dengan monitoring langsung di lapangan. Dalam pelaksanaannya dilakukan klarifikasi kepada KPM untuk mengetahui penyebab belum dilakukannya transaksi, seperti kendala kartu, rekening, akses layanan penyalur, kurangnya informasi, maupun faktor lainnya. Selain itu, diberikan penjelasan dan pendampingan kepada KPM terkait mekanisme transaksi bantuan sosial serta langkah-langkah yang perlu dilakukan agar bantuan dapat segera dimanfaatkan. Hasil penelitian dan monitoring ini dicatat sebagai bahan evaluasi dan tindak lanjut.", "hasil": "1. Teridentifikasinya KPM yang belum melakukan transaksi bantuan sosial beserta penyebabnya.\n\n2. KPM memperoleh penjelasan dan pendampingan terkait tata cara transaksi bantuan sosial.\n\n3. Tersusunnya data hasil monitoring sebagai bahan evaluasi dan tindak lanjut penanganan permasalahan transaksi.\n\n4. Meningkatnya pemahaman KPM mengenai pentingnya melakukan transaksi bantuan sosial sesuai periode yang ditentukan.", "simpulan": "Kegiatan penelitian penyaluran bantuan sosial yang difokuskan pada monitoring KPM yang belum melakukan transaksi telah dilaksanakan dengan baik. Melalui kegiatan ini, diperoleh informasi yang jelas mengenai penyebab keterlambatan transaksi serta kondisi KPM di lapangan, sehingga dapat menjadi dasar dalam pengambilan langkah tindak lanjut yang tepat.", "saran": "Perlu dilakukan monitoring secara berkala terhadap KPM yang belum melakukan transaksi agar permasalahan dapat ditangani lebih cepat. Selain itu, diperlukan peningkatan koordinasi dengan pihak penyalur dan pemerintah setempat untuk mempercepat penyelesaian kendala transaksi bantuan sosial.", "penutup": "Demikian laporan kegiatan penelitian penyaluran bantuan sosial ini disusun sebagai bentuk pertanggungjawaban pelaksanaan tugas. Diharapkan hasil kegiatan ini dapat membantu memastikan bantuan sosial dapat dimanfaatkan secara optimal oleh KPM sesuai ketentuan yang berlaku.", "editable_kegiatan": false}, {"rhk_no": 2, "rhk_title": "Terlaksananya pertemuan P2K2 sesuai dengan ketentuan", "ra_index": 1, "ra_title": "Melaksanakan Pertemuan Peningkatan Kemampuan Keluarga (P2K2)", "sub_title": "", "umum": "Pertemuan Peningkatan Kemampuan Keluarga (P2K2) merupakan salah satu kegiatan penting dalam pelaksanaan Program Keluarga Harapan (PKH) yang bertujuan untuk meningkatkan pengetahuan, sikap, dan keterampilan Keluarga Penerima Manfaat (KPM). Melalui kegiatan ini, KPM diharapkan mampu memahami peran dan tanggung jawabnya dalam keluarga serta memanfaatkan bantuan sosial secara lebih tepat dan berkelanjutan.", "maksud_tujuan": "Kegiatan P2K2 ini dimaksudkan sebagai sarana pembelajaran dan penguatan kapasitas KPM melalui penyampaian materi yang relevan dengan kebutuhan keluarga. Tujuan pelaksanaan kegiatan ini adalah untuk meningkatkan pemahaman KPM mengenai pengasuhan, kesehatan, pendidikan, pengelolaan keuangan keluarga, serta aspek penting lainnya yang mendukung peningkatan kesejahteraan keluarga.", "ruang_lingkup": "Ruang lingkup laporan ini meliputi pelaksanaan kegiatan Pertemuan Peningkatan Kemampuan Keluarga (P2K2) kepada KPM di wilayah dampingan.", "dasar": "Kegiatan ini dilaksanakan berdasarkan:\na.\tRencana Hasil Kerja (RHK) ASN PPPK Dit. PSNK terkait pelaksanaan P2K2.\nb.\tSalah satu proses bisnis PKH yang harus dilaksanakan oleh ASN PPPK Dit. PSNK\nc.\tData Keluarga Penerima Manfaat (KPM) yang bersumber dari SIKS-NG.", "kegiatan": "Kegiatan Pertemuan Peningkatan Kemampuan Keluarga (P2K2) dilaksanakan melalui pertemuan tatap muka bersama KPM di Kelurahan ………………, Kecamatan ………………. Dalam kegiatan ini disampaikan materi P2K2 dengan topik: ……………………………………, yang disesuaikan dengan kebutuhan dan kondisi KPM. Penyampaian materi dilakukan secara interaktif melalui diskusi, tanya jawab, serta berbagi pengalaman antar peserta. Selain itu, KPM juga diberikan kesempatan untuk menyampaikan permasalahan yang dihadapi dalam keluarga, sehingga kegiatan ini tidak hanya bersifat penyampaian materi, tetapi juga menjadi sarana saling belajar dan penguatan antar KPM.", "hasil": "1. KPM memperoleh pengetahuan dan pemahaman terkait materi P2K2 yang disampaikan.\n\n2. Meningkatnya kesadaran KPM terhadap peran dan tanggung jawab dalam keluarga.\n\n3. Terbangunnya komunikasi yang baik antar KPM melalui diskusi dan berbagi pengalaman.\n\n4. KPM terdorong untuk menerapkan materi P2K2 dalam kehidupan sehari-hari.", "simpulan": "Kegiatan Pertemuan Peningkatan Kemampuan Keluarga (P2K2) telah dilaksanakan dengan baik dan berjalan lancar. Melalui kegiatan ini, KPM memperoleh tambahan pengetahuan serta pemahaman yang bermanfaat dalam meningkatkan kualitas kehidupan keluarga, sesuai dengan materi yang telah disampaikan.", "saran": "Kegiatan P2K2 perlu dilaksanakan secara berkelanjutan dan konsisten agar pemahaman KPM semakin meningkat. Selain itu, pemilihan materi diharapkan dapat terus disesuaikan dengan kebutuhan nyata KPM.", "penutup": "Demikian laporan kegiatan Pertemuan Peningkatan Kemampuan Keluarga (P2K2) ini disusun sebagai bentuk pertanggungjawaban pelaksanaan tugas. Diharapkan kegiatan ini dapat memberikan manfaat nyata bagi KPM serta mendukung tujuan Program Keluarga Harapan.", "editable_kegiatan": false}, {"rhk_no": 3, "rhk_title": "Terlaksananya Verifikasi Komitmen  Pendidikan,Kesehatan dan Kesejahteraan Sosial  secara akurat sesuai dengan ketentuan.", "ra_index": 1, "ra_title": "Melaksanakan Verifikasi Komitmen Pendidikan,Kesehatan dan Kesejahteraan Sosial", "sub_title": "", "umum": "Verifikasi komitmen merupakan bagian penting dalam pelaksanaan Program Keluarga Harapan (PKH) untuk memastikan bahwa Keluarga Penerima Manfaat (KPM) memenuhi kewajiban sesuai dengan komponen yang diikuti, meliputi bidang pendidikan, kesehatan, dan kesejahteraan sosial. Kegiatan ini bertujuan untuk menilai kepatuhan KPM terhadap komitmen yang telah ditetapkan serta memastikan bahwa bantuan sosial yang diterima benar-benar mendukung peningkatan kualitas hidup keluarga.", "maksud_tujuan": "Kegiatan verifikasi komitmen ini dimaksudkan untuk melakukan pengecekan dan pemantauan terhadap pemenuhan komitmen KPM pada aspek pendidikan, kesehatan, dan kesejahteraan sosial. Tujuan pelaksanaannya adalah untuk memastikan KPM menjalankan kewajibannya sesuai ketentuan, mengidentifikasi kendala yang dihadapi, serta menjadi dasar dalam pengambilan langkah tindak lanjut dan pembinaan.", "ruang_lingkup": "Ruang lingkup laporan ini meliputi pelaksanaan kegiatan verifikasi komitmen KPM pada bidang pendidikan, kesehatan, dan kesejahteraan sosial di wilayah dampingan.", "dasar": "Kegiatan ini dilaksanakan berdasarkan:\na.\tRencana Hasil Kerja (RHK) ASN PPPK Dit. PSNK terkait verifikasi komitmen PKH.\nb.\tSalah satu proses bisnis PKH yang harus dilaksanakan oleh ASN PPPK Dit. PSNK\nc.\tData Keluarga Penerima Manfaat (KPM) yang bersumber dari SIKS-NG.", "kegiatan": "Kegiatan verifikasi komitmen dilaksanakan dengan melakukan pengecekan data dan kondisi KPM secara langsung maupun melalui dokumen pendukung di wilayah dampingan. Verifikasi pada bidang pendidikan dilakukan untuk memastikan kehadiran dan partisipasi anak KPM di satuan pendidikan sesuai ketentuan. Pada bidang kesehatan, dilakukan pengecekan terhadap kepatuhan KPM dalam memanfaatkan layanan kesehatan, seperti pemeriksaan ibu hamil, balita, lansia, maupun penyandang disabilitas. Sementara itu, pada bidang kesejahteraan sosial dilakukan pemantauan terhadap kondisi sosial KPM serta kesesuaian penerimaan bantuan. Selama kegiatan berlangsung, KPM juga diberikan penjelasan dan penguatan mengenai pentingnya pemenuhan komitmen sebagai bagian dari tujuan peningkatan kesejahteraan keluarga.", "hasil": "1. Terverifikasinya pemenuhan komitmen KPM pada bidang pendidikan, kesehatan, dan kesejahteraan sosial.\n\n2. Diketahuinya kendala atau permasalahan yang dihadapi KPM dalam memenuhi komitmen.\n\n3. Tersusunnya data hasil verifikasi sebagai bahan evaluasi dan tindak lanjut.\n\n4. Meningkatnya pemahaman KPM mengenai kewajiban dan komitmen dalam Program PKH.", "simpulan": "Kegiatan verifikasi komitmen Pendidikan, Kesehatan, dan Kesejahteraan Sosial telah dilaksanakan dengan baik dan memberikan gambaran yang jelas mengenai tingkat kepatuhan KPM dalam memenuhi kewajiban program. Hasil verifikasi ini menjadi dasar penting dalam evaluasi dan pembinaan KPM agar pelaksanaan PKH dapat berjalan sesuai tujuan.", "saran": "Perlu dilakukan verifikasi komitmen secara rutin dan berkelanjutan untuk memastikan kepatuhan KPM tetap terjaga. Selain itu, koordinasi dengan fasilitas pendidikan, kesehatan, dan pihak terkait perlu terus ditingkatkan guna mendukung kelancaran proses verifikasi dan penanganan kendala di lapangan.", "penutup": "Demikian laporan kegiatan verifikasi komitmen Pendidikan, Kesehatan, dan Kesejahteraan Sosial ini disusun sebagai bentuk pertanggungjawaban pelaksanaan tugas. Diharapkan kegiatan ini dapat mendukung peningkatan kualitas pelaksanaan Program Keluarga Harapan serta kesejahteraan KPM.", "editable_kegiatan": false}, {"rhk_no": 3, "rhk_title": "Terlaksananya Verifikasi Komitmen  Pendidikan,Kesehatan dan Kesejahteraan Sosial  secara akurat sesuai dengan ketentuan.", "ra_index": 2, "ra_title": "Melakukan pendampingan, mediasi, dan fasilitasi kepada KPM PKH dalam proses perubahan perilaku, pola pikir yang mandiri dan produktif", "sub_title": "", "umum": "Pendampingan, mediasi, dan fasilitasi merupakan bagian penting dalam pelaksanaan Program Keluarga Harapan (PKH) yang tidak hanya berfokus pada penyaluran bantuan sosial, tetapi juga pada upaya mendorong perubahan perilaku dan pola pikir Keluarga Penerima Manfaat (KPM) agar lebih mandiri dan produktif. Melalui kegiatan ini, KPM diharapkan mampu memahami peran dan tanggung jawabnya, mengelola bantuan secara bijak, serta berupaya meningkatkan kualitas hidup keluarga secara berkelanjutan.", "maksud_tujuan": "Kegiatan ini dimaksudkan untuk memberikan pendampingan secara berkelanjutan kepada KPM PKH melalui proses mediasi dan fasilitasi, guna membantu KPM menghadapi permasalahan sosial maupun ekonomi yang dihadapi. Tujuannya adalah untuk menumbuhkan kesadaran, mengubah pola pikir ketergantungan menjadi lebih mandiri, serta mendorong KPM agar mampu berperilaku produktif dan berdaya dalam kehidupan sehari-hari.", "ruang_lingkup": "Ruang lingkup laporan ini meliputi pelaksanaan kegiatan pendampingan, mediasi, dan fasilitasi kepada KPM PKH di wilayah dampingan.", "dasar": "Kegiatan ini dilaksanakan berdasarkan:\na.\tRencana Hasil Kerja (RHK) ASN PPPK Dit. PSNK terkait pendampingan dan pembinaan KPM PKH.\nb.\tSalah satu proses bisnis PKH yang harus dilaksanakan oleh ASN PPPK Dit. PSNK\nc.\tData Keluarga Penerima Manfaat (KPM) yang bersumber dari SIKS-NG.", "kegiatan": "Kegiatan pendampingan, mediasi, dan fasilitasi dilaksanakan melalui interaksi langsung dengan KPM PKH di wilayah dampingan. Dalam kegiatan ini dilakukan pendampingan untuk menggali permasalahan yang dihadapi KPM, baik yang berkaitan dengan aspek sosial, ekonomi, maupun keluarga. KPM juga difasilitasi untuk memperoleh informasi, layanan, serta rujukan yang diperlukan. Melalui proses ini, KPM diberikan penguatan dan motivasi agar mampu mengubah perilaku dan pola pikir menuju kemandirian serta mendorong tumbuhnya sikap produktif dalam memenuhi kebutuhan keluarga.", "hasil": "1. KPM memperoleh pendampingan dan pemahaman dalam menghadapi permasalahan yang dialami.\n\n2. Terlaksananya proses mediasi yang membantu penyelesaian permasalahan KPM secara musyawarah.\n\n3. KPM mendapatkan fasilitasi dan akses informasi atau layanan yang dibutuhkan.\n\n4. Mulai tumbuhnya kesadaran KPM untuk bersikap mandiri, bertanggung jawab, dan produktif.", "simpulan": "Kegiatan pendampingan, mediasi, dan fasilitasi kepada KPM PKH telah dilaksanakan dengan baik dan memberikan dampak positif dalam proses perubahan perilaku serta pola pikir KPM. Melalui kegiatan ini, KPM tidak hanya terbantu dalam menyelesaikan permasalahan yang dihadapi, tetapi juga mendapatkan penguatan untuk menuju kehidupan yang lebih mandiri dan produktif.", "saran": "Pendampingan kepada KPM PKH perlu dilakukan secara berkelanjutan agar perubahan perilaku dan pola pikir yang telah terbentuk dapat terus berkembang. Selain itu, perlu ditingkatkan sinergi dengan pihak terkait guna memperluas akses KPM terhadap peluang dan sumber daya yang mendukung kemandirian.", "penutup": "Demikian laporan kegiatan pendampingan, mediasi, dan fasilitasi kepada KPM PKH ini disusun sebagai bentuk pertanggungjawaban pelaksanaan tugas. Diharapkan kegiatan ini dapat mendukung tujuan Program Keluarga Harapan dalam meningkatkan kesejahteraan dan kemandirian KPM.", "editable_kegiatan": false}, {"rhk_no": 4, "rhk_title": "Tersedianya Data KPM graduasi yang disusun sesuai dengan instrumen dan ketentuan", "ra_index": 1, "ra_title": "Melakukan usulan KPM Graduasi mandiri dan Pemberdayaan PPSE", "sub_title": "1. Sudah TTD Surat Pernyataan", "umum": "Graduasi mandiri merupakan salah satu indikator keberhasilan pelaksanaan Program Keluarga Harapan (PKH), di mana Keluarga Penerima Manfaat (KPM) telah memiliki kemandirian secara sosial dan ekonomi sehingga tidak lagi bergantung pada bantuan sosial. Kegiatan ini dilaksanakan untuk mengusulkan KPM yang telah siap dan bersedia melakukan graduasi mandiri, dibuktikan dengan penandatanganan surat pernyataan graduasi.", "maksud_tujuan": "Kegiatan ini dimaksudkan untuk melakukan pengusulan KPM PKH yang telah menyatakan kesediaannya untuk graduasi mandiri. Tujuannya adalah sebagai bentuk pencatatan dan penguatan komitmen KPM yang telah mampu mandiri serta memastikan proses graduasi berjalan sesuai ketentuan.", "ruang_lingkup": "Ruang lingkup laporan ini meliputi kegiatan usulan KPM graduasi mandiri di wilayah dampingan.", "dasar": "Kegiatan ini dilaksanakan berdasarkan:\na.\tRencana Hasil Kerja (RHK) ASN PPPK Dit. PSNK terkait graduasi mandiri KPM PKH.\nb.\tSalah satu proses bisnis PKH yang harus dilaksanakan oleh ASN PPPK Dit. PSNK\nc.\tData Keluarga Penerima Manfaat (KPM) yang bersumber dari SIKS-NG.\nd. Surat pernyataan graduasi mandiri dari KPM.", "kegiatan": "Kegiatan dilaksanakan melalui pendampingan dan verifikasi terhadap KPM PKH yang telah menyatakan kesiapan untuk graduasi mandiri. Dalam kegiatan ini dilakukan pengecekan kondisi sosial dan ekonomi KPM, klarifikasi atas kesediaan graduasi, serta pengumpulan surat pernyataan graduasi mandiri yang telah ditandatangani oleh KPM. Selanjutnya, KPM diusulkan sebagai KPM graduasi mandiri sesuai dengan ketentuan yang berlaku. Adapun Data KPM PKH yang telah menandatangani Surat Pernyataan Graduasi adalah:\nNama :\nNIK:\nAlamat:\nKelurahan:", "hasil": "1. Terdata KPM yang telah menandatangani surat pernyataan graduasi mandiri.\n\n2. Terbangunnya komitmen KPM untuk tidak lagi menerima bantuan sosial.\n\n3. Tersusunnya usulan graduasi mandiri sebagai bahan tindak lanjut.", "simpulan": "Kegiatan usulan KPM graduasi mandiri telah dilaksanakan dengan baik dan menunjukkan adanya KPM yang telah siap secara sosial dan ekonomi untuk keluar dari Program Keluarga Harapan. Penandatanganan surat pernyataan graduasi menjadi bukti komitmen KPM untuk mandiri dan tidak lagi bergantung pada bantuan sosial.", "saran": "Perlu dilakukan pendampingan lanjutan pasca graduasi agar KPM yang telah graduasi tetap mampu mempertahankan kemandiriannya. Selain itu, data KPM graduasi perlu dipantau secara berkala sebagai bahan evaluasi keberhasilan program.", "penutup": "Demikian laporan kegiatan usulan KPM graduasi mandiri ini disusun sebagai bentuk pertanggungjawaban pelaksanaan tugas. Diharapkan kegiatan ini dapat mendukung terwujudnya kemandirian KPM dan keberhasilan Program Keluarga Harapan.", "editable_kegiatan": true}, {"rhk_no": 4, "rhk_title": "Tersedianya Data KPM graduasi yang disusun sesuai dengan instrumen dan ketentuan", "ra_index": 2, "ra_title": "Melakukan usulan KPM Graduasi mandiri dan Pemberdayaan PPSE", "sub_title": "2. Usulan Graduasi", "umum": "Dalam pelaksanaan Program Keluarga Harapan (PKH), terdapat KPM yang menunjukkan perkembangan positif dan berpotensi untuk melakukan graduasi mandiri. Kegiatan ini dilaksanakan sebagai bagian dari perencanaan dan pemetaan target KPM yang dinilai siap diarahkan menuju graduasi mandiri.", "maksud_tujuan": "Kegiatan ini dimaksudkan untuk menyusun perencanaan target graduasi mandiri bagi KPM yang dinilai potensial. Tujuannya adalah sebagai langkah awal pembinaan dan pendampingan terarah agar KPM dapat dipersiapkan menuju kemandirian.", "ruang_lingkup": "Ruang lingkup laporan ini meliputi kegiatan perencanaan target graduasi mandiri KPM di wilayah dampingan.", "dasar": "Kegiatan ini dilaksanakan berdasarkan:\na.\tRencana Hasil Kerja (RHK) ASN PPPK Dit. PSNK terkait perencanaan graduasi mandiri KPM PKH.\nb.\tSalah satu proses bisnis PKH yang harus dilaksanakan oleh ASN PPPK Dit. PSNK\nc.\tData Keluarga Penerima Manfaat (KPM) yang bersumber dari SIKS-NG.", "kegiatan": "Kegiatan dilaksanakan melalui identifikasi dan pemetaan KPM yang menunjukkan peningkatan kondisi sosial dan ekonomi. Dalam kegiatan ini dilakukan pengamatan terhadap kemandirian KPM, sumber penghasilan, serta pola pemanfaatan bantuan sosial. KPM yang dinilai potensial kemudian ditetapkan sebagai target graduasi mandiri dan diberikan pendampingan serta penguatan secara bertahap sebagai persiapan menuju graduasi. Adapun nama target graduasi terlampir.", "hasil": "1. Teridentifikasinya KPM potensial graduasi mandiri.\n\n2. Tersusunnya daftar target KPM graduasi mandiri.\n\n3. Adanya arah pendampingan yang lebih terfokus bagi KPM potensial.", "simpulan": "Kegiatan perencanaan target KPM graduasi mandiri telah memberikan gambaran awal mengenai KPM yang berpotensi untuk mandiri. Perencanaan ini menjadi dasar penting dalam menyusun strategi pendampingan yang lebih terarah dan berkelanjutan.\n", "saran": "Perlu dilakukan pendampingan intensif dan pemantauan berkala terhadap KPM potensial graduasi agar kesiapan mereka dapat terus ditingkatkan. Selain itu, target graduasi perlu dievaluasi secara periodik sesuai dengan perkembangan kondisi KPM.", "penutup": "Demikian laporan perencanaan target KPM graduasi mandiri ini disusun sebagai bentuk pertanggungjawaban pelaksanaan tugas. Diharapkan perencanaan ini dapat mendukung peningkatan jumlah KPM yang siap menuju kemandirian.", "editable_kegiatan": true}, {"rhk_no": 4, "rhk_title": "Tersedianya Data KPM graduasi yang disusun sesuai dengan instrumen dan ketentuan", "ra_index": 3, "ra_title": "Melakukan usulan KPM Graduasi mandiri dan Pemberdayaan PPSE", "sub_title": "3. PPSE", "umum": "Program Pemberdayaan Penerima Program Sosial Ekonomi (PPSE) merupakan upaya untuk meningkatkan kapasitas dan kemandirian ekonomi KPM melalui kegiatan pemberdayaan. Kegiatan ini dilaksanakan untuk mengusulkan KPM PKH yang bersedia dan dinilai sesuai untuk mengikuti program PPSE.", "maksud_tujuan": "Kegiatan ini dimaksudkan untuk mengusulkan KPM PKH yang bersedia mengikuti program PPSE. Tujuannya adalah untuk memberikan akses pemberdayaan ekonomi bagi KPM agar mampu meningkatkan produktivitas dan kemandirian.", "ruang_lingkup": "Ruang lingkup laporan ini meliputi kegiatan usulan KPM mengikuti program PPSE di wilayah dampingan.", "dasar": "Kegiatan ini dilaksanakan berdasarkan:\na.\tRencana Hasil Kerja (RHK) ASN PPPK Dit. PSNK terkait pemberdayaan KPM melalui PPSE.\nb.\tSalah satu proses bisnis PKH yang harus dilaksanakan oleh ASN PPPK Dit. PSNK\nc.\tData Keluarga Penerima Manfaat (KPM) yang bersumber dari SIKS-NG.\nd. Hasil pendampingan dan kesediaan KPM mengikuti program PPSE.", "kegiatan": "Kegiatan dilaksanakan melalui pendampingan dan komunikasi dengan KPM PKH terkait program PPSE. Dalam kegiatan ini diberikan penjelasan mengenai tujuan, manfaat, dan mekanisme program PPSE. KPM yang menyatakan bersedia kemudian didata dan diusulkan sebagai calon peserta program PPSE sesuai ketentuan yang berlaku. Adapun data asesmen KPM yang bersedia mengikuti program PPSE terlampir.", "hasil": "1. Terdata KPM yang bersedia mengikuti program PPSE.\n\n2. Meningkatnya pemahaman KPM mengenai program pemberdayaan ekonomi.\n\n3. Tersusunnya usulan KPM peserta program PPSE.", "simpulan": "Kegiatan usulan KPM mengikuti program PPSE telah dilaksanakan dengan baik dan mendapat respons positif dari KPM. Program ini diharapkan menjadi sarana peningkatan kapasitas dan produktivitas ekonomi KPM menuju kemandirian.", "saran": "Perlu dilakukan pendampingan lanjutan bagi KPM yang diusulkan agar siap mengikuti seluruh tahapan program PPSE. Selain itu, koordinasi dengan pihak penyelenggara program perlu ditingkatkan untuk memastikan keberlanjutan pemberdayaan KPM.", "penutup": "Demikian laporan kegiatan usulan KPM mengikuti program PPSE ini disusun sebagai bentuk pertanggungjawaban pelaksanaan tugas. Diharapkan kegiatan ini dapat mendukung peningkatan kesejahteraan dan kemandirian ekonomi KPM PKH.", "editable_kegiatan": true}, {"rhk_no": 5, "rhk_title": "Terlaksananya Verifikasi, Validasi dan Permutakhiran Data KPM  secara akurat sesuai dengan ketentuan.", "ra_index": 1, "ra_title": "Melaksanakan Pemutakhiran Data", "sub_title": "1. Pemutakhiran Data KPM PKH", "umum": "Pemutakhiran data merupakan kegiatan penting dalam pelaksanaan Program Keluarga Harapan (PKH) untuk memastikan data Keluarga Penerima Manfaat (KPM) selalu akurat, mutakhir, dan sesuai dengan kondisi riil di lapangan. Data yang valid menjadi dasar dalam penyaluran bantuan sosial, verifikasi komitmen, serta perencanaan program pemberdayaan dan graduasi KPM. Oleh karena itu, kegiatan pemutakhiran data perlu dilaksanakan secara berkala.", "maksud_tujuan": "Kegiatan pemutakhiran data ini dimaksudkan untuk memperbarui dan menyesuaikan data KPM sesuai dengan perubahan kondisi sosial, ekonomi, dan kependudukan. Tujuan pelaksanaannya adalah untuk meningkatkan keakuratan data, mencegah kesalahan sasaran bantuan, serta mendukung ketepatan pengambilan keputusan dalam pelaksanaan program PKH.", "ruang_lingkup": "Ruang lingkup laporan ini meliputi pelaksanaan kegiatan pemutakhiran data KPM di wilayah dampingan.", "dasar": "Kegiatan ini dilaksanakan berdasarkan:\na.\tRencana Hasil Kerja (RHK) ASN PPPK Dit. PSNK terkait pemutakhiran data.\nb.\tSalah satu proses bisnis PKH yang harus dilaksanakan oleh ASN PPPK Dit. PSNK\nc.\tData Keluarga Penerima Manfaat (KPM) yang bersumber dari SIKS-NG.", "kegiatan": "Kegiatan pemutakhiran data dilaksanakan melalui penelusuran dan pengecekan langsung terhadap data KPM di wilayah dampingan. Dalam kegiatan ini dilakukan klarifikasi data kependudukan, kondisi keluarga, komponen kepesertaan, serta perubahan kondisi sosial dan ekonomi KPM. Data yang diperoleh kemudian dicocokkan dengan data yang tercantum dalam sistem, dan dilakukan pembaruan sesuai dengan hasil temuan di lapangan. Selama proses pemutakhiran data, KPM juga diberikan penjelasan mengenai pentingnya menyampaikan informasi yang benar dan terkini.", "hasil": "1.Terbaruinya data KPM sesuai dengan kondisi riil di lapangan.\n\n2. Diketahuinya perubahan kondisi sosial, ekonomi, dan kependudukan KPM.\n\n3. Meningkatnya keakuratan dan validitas data KPM.\n\n4. Tersedianya data mutakhir sebagai dasar tindak lanjut program PKH.", "simpulan": "Kegiatan pemutakhiran data KPM telah dilaksanakan dengan baik dan memberikan kontribusi penting dalam menjaga keakuratan data Program Keluarga Harapan. Data yang mutakhir menjadi dasar dalam pelaksanaan berbagai kegiatan PKH, termasuk penyaluran bantuan, verifikasi komitmen, serta perencanaan graduasi dan pemberdayaan KPM.", "saran": "Pemutakhiran data KPM perlu dilakukan secara rutin dan berkelanjutan agar data yang digunakan selalu relevan dengan kondisi di lapangan. Selain itu, perlu ditingkatkan koordinasi dengan KPM dan pihak terkait untuk memastikan kelengkapan dan kebenaran data.", "penutup": "Demikian laporan kegiatan pemutakhiran data Keluarga Penerima Manfaat (KPM) ini disusun sebagai bentuk pertanggungjawaban pelaksanaan tugas. Diharapkan hasil kegiatan ini dapat mendukung pelaksanaan Program Keluarga Harapan secara lebih tepat sasaran dan akuntabel.", "editable_kegiatan": false}, {"rhk_no": 5, "rhk_title": "Terlaksananya Verifikasi, Validasi dan Permutakhiran Data KPM  secara akurat sesuai dengan ketentuan.", "ra_index": 2, "ra_title": "Melaksanakan Pemutakhiran Data", "sub_title": "2. Pembaruan DTSEN/Groundcheck", "umum": "Pembaruan DTSEN atau groundcheck merupakan kegiatan penting dalam rangka memastikan tingkat kesejahteraan Keluarga Penerima Manfaat (KPM) sesuai dengan kondisi riil di lapangan. Kegiatan ini dilakukan untuk memvalidasi dan memperbarui klasifikasi desil kesejahteraan, sehingga data yang digunakan dalam penetapan kebijakan dan program bantuan sosial benar-benar mencerminkan kondisi sebenarnya.", "maksud_tujuan": "Kegiatan pembaruan DTSEN/groundcheck ini dimaksudkan untuk melakukan pengecekan langsung kondisi sosial dan ekonomi KPM sebagai dasar penyesuaian klasifikasi desil kesejahteraan. Tujuan pelaksanaannya adalah untuk meningkatkan akurasi data, memastikan ketepatan sasaran bantuan sosial, serta mendukung pengambilan keputusan yang adil dan tepat.", "ruang_lingkup": "Ruang lingkup laporan ini meliputi pelaksanaan kegiatan pembaruan DTSEN/groundcheck KPM di wilayah dampingan.", "dasar": "Kegiatan ini dilaksanakan berdasarkan:\na.\tRencana Hasil Kerja (RHK) ASN PPPK Dit. PSNK terkait pemutakhiran data.\nb.\tSalah tugas yang harus dilaksanakan oleh ASN PPPK Dit. PSNK\nc.\tData Pembaruan DTSEN yang bersumber dari SIKMA.", "kegiatan": "Kegiatan pembaruan DTSEN/groundcheck dilaksanakan melalui kunjungan dan pengecekan langsung ke rumah KPM di wilayah dampingan. Dalam kegiatan ini dilakukan pengamatan terhadap kondisi tempat tinggal, sumber penghasilan, kepemilikan aset, serta kondisi sosial ekonomi keluarga. Data dan informasi yang diperoleh kemudian dicocokkan dengan data yang tercantum dalam sistem. Hasil groundcheck dicatat sebagai bahan pembaruan desil kesejahteraan serta dasar tindak lanjut sesuai ketentuan yang berlaku.", "hasil": "1. Diperolehnya data kondisi riil sosial dan ekonomi KPM di lapangan.\n\n2. Teridentifikasinya kesesuaian atau perubahan klasifikasi desil kesejahteraan KPM.\n\n3. Meningkatnya akurasi data kesejahteraan KPM.\n\n4. Tersedianya data hasil groundcheck sebagai bahan evaluasi dan tindak lanjut program bantuan sosial.", "simpulan": "Kegiatan pembaruan DTSEN/groundcheck telah dilaksanakan dengan baik dan memberikan gambaran nyata mengenai kondisi kesejahteraan KPM di wilayah dampingan. Hasil kegiatan ini menjadi dasar penting dalam menjaga ketepatan sasaran program bantuan sosial serta pembaruan data kesejahteraan.", "saran": "Pembaruan DTSEN/groundcheck perlu dilakukan secara berkala agar data kesejahteraan KPM selalu mutakhir. Selain itu, diperlukan koordinasi yang berkelanjutan dengan pihak terkait untuk menindaklanjuti hasil groundcheck sesuai dengan ketentuan yang berlaku.", "penutup": "Demikian laporan kegiatan pembaruan DTSEN/groundcheck Keluarga Penerima Manfaat (KPM) ini disusun sebagai bentuk pertanggungjawaban pelaksanaan tugas. Diharapkan kegiatan ini dapat mendukung penyaluran bantuan sosial yang lebih tepat sasaran dan berbasis data yang akurat.", "editable_kegiatan": false}, {"rhk_no": 5, "rhk_title": "Terlaksananya Verifikasi, Validasi dan Permutakhiran Data KPM  secara akurat sesuai dengan ketentuan.", "ra_index": 3, "ra_title": "Melaksanakan proses bisnis PKH yang meliputi verifikasi validasi calon penerima bantuan sosial", "sub_title": "", "umum": "Verifikasi dan validasi calon penerima bantuan sosial merupakan bagian penting dalam proses bisnis Program Keluarga Harapan (PKH) untuk memastikan bahwa bantuan diberikan kepada keluarga yang benar-benar memenuhi kriteria. Kegiatan ini bertujuan untuk menilai kesesuaian data calon penerima dengan kondisi riil di lapangan, sehingga penetapan penerima bantuan sosial dapat dilakukan secara tepat sasaran dan akuntabel.", "maksud_tujuan": "Pelaksanaan proses bisnis PKH yang meliputi verifikasi dan validasi calon penerima bantuan sosial ini dimaksudkan untuk memastikan kebenaran dan kelayakan data calon penerima. Tujuan kegiatan ini adalah untuk mencegah kesalahan sasaran, meningkatkan kualitas data penerima bantuan sosial, serta mendukung penyaluran bantuan yang adil dan sesuai ketentuan.", "ruang_lingkup": "Ruang lingkup laporan ini meliputi pelaksanaan proses bisnis PKH berupa verifikasi dan validasi calon penerima bantuan sosial di wilayah dampingan.", "dasar": "Kegiatan ini dilaksanakan berdasarkan:\na.\tRencana Hasil Kerja (RHK) ASN PPPK Dit. PSNK terkait pverifikasi dan validasi calon penerima bantuan sosial.\nb.\tSalah tugas yang harus dilaksanakan oleh ASN PPPK Dit. PSNK\nc.\tData calon penerima bantuan sosial yang bersumber dari SIKS-NG serta hasil penelusuran lapangan.", "kegiatan": "Kegiatan verifikasi dan validasi calon penerima bantuan sosial dilaksanakan melalui penelusuran data dan pengecekan langsung di lapangan. Dalam kegiatan ini dilakukan pencocokan data kependudukan, kondisi sosial ekonomi, serta kelayakan calon penerima bantuan sosial dengan kondisi nyata yang ditemukan. Selain itu, dilakukan klarifikasi kepada calon penerima dan pihak terkait guna memastikan keakuratan data. Hasil verifikasi dan validasi ini dicatat sebagai bahan penetapan dan tindak lanjut sesuai ketentuan yang berlaku.", "hasil": "1. Terverifikasi dan tervalidasinya data calon penerima bantuan sosial.\n\n2. Diketahuinya kesesuaian atau ketidaksesuaian data calon penerima dengan kondisi riil di lapangan.\n\n3. Tersedianya data yang lebih akurat sebagai dasar penetapan penerima bantuan sosial.\n\n4. Meningkatnya ketepatan sasaran penyaluran bantuan sosial.", "simpulan": "Pelaksanaan proses bisnis PKH yang meliputi verifikasi dan validasi calon penerima bantuan sosial telah dilaksanakan dengan baik. Kegiatan ini memberikan gambaran yang jelas mengenai kelayakan calon penerima dan menjadi dasar penting dalam penetapan penerima bantuan sosial agar tepat sasaran dan sesuai ketentuan.", "saran": "Verifikasi dan validasi calon penerima bantuan sosial perlu dilakukan secara cermat dan berkelanjutan untuk menjaga kualitas data. Selain itu, diperlukan koordinasi yang baik dengan pihak terkait agar hasil verifikasi dapat segera ditindaklanjuti dalam proses penetapan penerima bantuan sosial.", "penutup": "Demikian laporan pelaksanaan proses bisnis PKH yang meliputi verifikasi dan validasi calon penerima bantuan sosial ini disusun sebagai bentuk pertanggungjawaban pelaksanaan tugas. Diharapkan kegiatan ini dapat mendukung pelaksanaan program bantuan sosial yang lebih tepat sasaran, transparan, dan akuntabel.", "editable_kegiatan": false}, {"rhk_no": 6, "rhk_title": "Terlaksananya kegiatan kasus adaptif (Respon kasus/pengaduan/kebencanaan/kerentanan) disusun secara lengkap dan akurat", "ra_index": 1, "ra_title": "Melaksanakan Respon Kasus/Pengaduan/kebencanaan/Kerentanan", "sub_title": "Respon Kasus/Pengaduan", "umum": "Dalam pelaksanaan Program Keluarga Harapan (PKH), tidak terlepas dari adanya kasus atau pengaduan yang disampaikan oleh Keluarga Penerima Manfaat (KPM) maupun masyarakat. Kasus atau pengaduan tersebut perlu ditangani secara cepat, tepat, dan sesuai ketentuan agar tidak menimbulkan permasalahan yang berkepanjangan. Oleh karena itu, kegiatan respons kasus/pengaduan menjadi bagian penting dalam menjaga kualitas layanan dan kepercayaan masyarakat terhadap pelaksanaan program.", "maksud_tujuan": "Kegiatan respons kasus/pengaduan ini dimaksudkan untuk menindaklanjuti laporan atau keluhan yang disampaikan oleh KPM atau masyarakat terkait pelaksanaan PKH. Tujuan kegiatan ini adalah untuk mengklarifikasi permasalahan, memberikan penjelasan yang diperlukan, serta mencari solusi yang tepat sesuai dengan ketentuan yang berlaku.", "ruang_lingkup": "Ruang lingkup laporan ini meliputi pelaksanaan kegiatan respons dan penanganan kasus/pengaduan PKH", "dasar": "Kegiatan ini dilaksanakan berdasarkan:\na.\tRencana Hasil Kerja (RHK) ASN PPPK Dit. PSNK terkait penanganan kasus dan pengaduan PKH.\nb.\tSalah satu proses bisnis PKH yang harus dilaksanakan oleh ASN PPPK Dit. PSNK\nc.\tData Keluarga Penerima Manfaat (KPM) yang bersumber dari SIKS-NG.", "kegiatan": "Kegiatan respons kasus/pengaduan dilaksanakan dengan menerima dan menindaklanjuti laporan atau keluhan yang disampaikan oleh KPM atau masyarakat. Dalam kegiatan ini dilakukan penelusuran dan klarifikasi terhadap permasalahan yang diadukan, baik melalui komunikasi langsung, kunjungan lapangan, maupun koordinasi dengan pihak terkait. Hasil klarifikasi kemudian ditindaklanjuti dengan memberikan penjelasan, pendampingan, atau rekomendasi penyelesaian sesuai dengan ketentuan yang berlaku, serta dicatat sebagai bahan dokumentasi dan evaluasi.", "hasil": "1. Teridentifikasinya kasus atau pengaduan yang disampaikan oleh KPM atau masyarakat.\n\n2. Diperolehnya klarifikasi atas permasalahan yang diadukan.\n\n3. Tersusunnya tindak lanjut atau rekomendasi penyelesaian kasus/pengaduan.\n\n4. Meningkatnya pemahaman KPM terkait mekanisme dan ketentuan PKH.", "simpulan": "Kegiatan respons kasus/pengaduan PKH telah dilaksanakan dengan baik dan memberikan penanganan terhadap permasalahan yang disampaikan oleh KPM atau masyarakat. Melalui kegiatan ini, kasus atau pengaduan dapat ditangani secara lebih cepat dan terarah sesuai dengan ketentuan yang berlaku.", "saran": "Perlu dilakukan peningkatan koordinasi dan komunikasi dengan pihak terkait dalam penanganan kasus/pengaduan agar penyelesaiannya dapat dilakukan lebih efektif. Selain itu, pencatatan dan dokumentasi kasus perlu dilakukan secara tertib sebagai bahan evaluasi pelaksanaan program.", "penutup": "Demikian laporan kegiatan respons kasus/pengaduan Program Keluarga Harapan (PKH) ini disusun sebagai bentuk pertanggungjawaban pelaksanaan tugas. Diharapkan kegiatan ini dapat meningkatkan kualitas pelayanan dan kepercayaan masyarakat terhadap pelaksanaan Program Keluarga Harapan.", "editable_kegiatan": false}, {"rhk_no": 8, "rhk_title": "Terlaksananya direktif pimpinan sesuai dengan penugasan ;  program Kementrian Sosial)", "ra_index": 1, "ra_title": "Melaksanakan Tindak Lanjut Hasil Pemeriksaan (TLHP)", "sub_title": "", "umum": "Tindak Lanjut Hasil Pemeriksaan (TLHP) merupakan bagian penting dalam upaya perbaikan dan pengendalian pelaksanaan Program Keluarga Harapan (PKH). Kegiatan ini dilaksanakan untuk menindaklanjuti temuan hasil pemeriksaan, baik yang berasal dari pengawasan internal maupun eksternal, agar pelaksanaan program berjalan sesuai dengan ketentuan yang berlaku serta mendukung akuntabilitas dan transparansi.", "maksud_tujuan": "Kegiatan TLHP ini dimaksudkan untuk menindaklanjuti hasil pemeriksaan yang telah dilakukan terhadap pelaksanaan Program Keluarga Harapan. Tujuan kegiatan ini adalah untuk memastikan setiap temuan ditindaklanjuti secara tepat, memperbaiki kekurangan yang ditemukan, serta mencegah terulangnya permasalahan yang sama di kemudian hari.", "ruang_lingkup": "Ruang lingkup laporan ini meliputi pelaksanaan kegiatan Tindak Lanjut Hasil Pemeriksaan (TLHP) Program Keluarga Harapan di wilayah dampingan.", "dasar": "Kegiatan ini dilaksanakan berdasarkan:\na.\tRencana Hasil Kerja (RHK) ASN PPPK Dit. PSNK terkait Tindak Lanjut Hasil Pemeriksaan (TLHP).\nb.\tSalah satu proses bisnis PKH yang harus dilaksanakan oleh ASN PPPK Dit. PSNK\nc.\tData Keluarga Penerima Manfaat (KPM) yang bersumber dari SIKS-NG.", "kegiatan": "Kegiatan Tindak Lanjut Hasil Pemeriksaan (TLHP) dilaksanakan dengan menelaah dan menindaklanjuti setiap temuan hasil pemeriksaan sesuai rekomendasi yang diberikan. Dalam kegiatan ini dilakukan klarifikasi data, perbaikan administrasi, pemutakhiran data, serta koordinasi dengan pihak terkait guna menyelesaikan permasalahan yang ditemukan. Seluruh proses tindak lanjut dicatat dan didokumentasikan sebagai bahan laporan pertanggungjawaban dan evaluasi.", "hasil": "1. Terlaksananya tindak lanjut terhadap temuan hasil pemeriksaan sesuai rekomendasi.\n\n2. Teridentifikasinya perbaikan yang telah dan masih perlu dilakukan.\n\n3. Meningkatnya kepatuhan terhadap ketentuan pelaksanaan Program PKH.\n\n4. Tersedianya dokumentasi tindak lanjut sebagai bahan evaluasi.", "simpulan": "Kegiatan Tindak Lanjut Hasil Pemeriksaan (TLHP) telah dilaksanakan dengan baik dan menjadi langkah penting dalam memperbaiki serta menyempurnakan pelaksanaan Program Keluarga Harapan. Tindak lanjut yang dilakukan membantu memastikan bahwa setiap temuan hasil pemeriksaan ditangani secara bertanggung jawab dan sesuai ketentuan.", "saran": "Perlu dilakukan pemantauan secara berkelanjutan terhadap pelaksanaan tindak lanjut hasil pemeriksaan agar perbaikan yang telah dilakukan dapat berjalan optimal. Selain itu, koordinasi dengan pihak terkait perlu terus ditingkatkan untuk mendukung penyelesaian seluruh rekomendasi pemeriksaan.", "penutup": "Demikian laporan kegiatan Tindak Lanjut Hasil Pemeriksaan (TLHP) Program Keluarga Harapan (PKH) ini disusun sebagai bentuk pertanggungjawaban pelaksanaan tugas. Diharapkan kegiatan ini dapat meningkatkan akuntabilitas serta kualitas pelaksanaan Program Keluarga Harapan.", "editable_kegiatan": false}, {"rhk_no": 8, "rhk_title": "Terlaksananya direktif pimpinan sesuai dengan penugasan ;  program Kementrian Sosial)", "ra_index": 2, "ra_title": "Melakukan sosialisasi kebijakan dan bisnis proses PKH kepada aparat pemerintah tingkat kecamatan, desa/ kelurahan, KPM PKH, dan masyarakat umum secara berkala melalui Pertemuan  atau media sosial dll", "sub_title": "", "umum": "Sosialisasi kebijakan dan proses bisnis Program Keluarga Harapan (PKH) merupakan kegiatan penting untuk meningkatkan pemahaman seluruh pihak terkait, mulai dari aparat pemerintah di tingkat kecamatan dan desa/kelurahan, Keluarga Penerima Manfaat (KPM), hingga masyarakat umum. Pemahaman yang baik terhadap kebijakan dan alur pelaksanaan PKH diharapkan dapat mendukung kelancaran program, meningkatkan sinergi antar pihak, serta meminimalkan kesalahpahaman dalam pelaksanaannya.", "maksud_tujuan": "Kegiatan sosialisasi ini dimaksudkan untuk menyampaikan informasi mengenai kebijakan serta proses bisnis PKH kepada seluruh pemangku kepentingan. Tujuan kegiatan ini adalah agar aparat pemerintah, KPM, dan masyarakat umum memahami peran dan tanggung jawab masing-masing, mengetahui alur pelaksanaan program, serta mendukung pelaksanaan PKH secara tepat sasaran, transparan, dan akuntabel.", "ruang_lingkup": "Ruang lingkup laporan ini meliputi pelaksanaan kegiatan sosialisasi kebijakan dan proses bisnis PKH di wilayah dampingan", "dasar": "Kegiatan ini dilaksanakan berdasarkan:\na.\tRencana Hasil Kerja (RHK) ASN PPPK Dit. PSNK terkait sosialisasi kebijakan dan proses bisnis PKH.\nb.\tSalah satu proses bisnis PKH yang harus dilaksanakan oleh ASN PPPK Dit. PSNK\nc.\tKebutuhan peningkatan pemahaman pemangku kepentingan terhadap pelaksanaan PKH.", "kegiatan": "Kegiatan sosialisasi kebijakan dan proses bisnis PKH dilaksanakan secara berkala melalui berbagai metode, antara lain pertemuan tatap muka, forum koordinasi, serta pemanfaatan media sosial dan media komunikasi lainnya. Materi sosialisasi mencakup kebijakan PKH, alur proses bisnis, hak dan kewajiban KPM, serta peran aparat pemerintah dan masyarakat dalam mendukung pelaksanaan program. Penyampaian materi dilakukan secara komunikatif dan interaktif, disertai dengan sesi diskusi dan tanya jawab guna memastikan peserta memahami informasi yang disampaikan.", "hasil": "1. Meningkatnya pemahaman aparat pemerintah, KPM, dan masyarakat umum mengenai kebijakan dan proses bisnis PKH.\n\n2. Terbangunnya kesamaan persepsi antar pemangku kepentingan dalam pelaksanaan PKH.\n\n3. Berkurangnya potensi kesalahpahaman terkait pelaksanaan dan ketentuan PKH.\n\n4. Meningkatnya partisipasi dan dukungan masyarakat terhadap pelaksanaan PKH.", "simpulan": "Kegiatan sosialisasi kebijakan dan proses bisnis PKH telah dilaksanakan dengan baik dan memberikan manfaat dalam meningkatkan pemahaman serta koordinasi antar pemangku kepentingan. Melalui kegiatan ini, informasi mengenai PKH dapat disampaikan secara lebih luas, baik melalui pertemuan langsung maupun media sosial.", "saran": "Sosialisasi kebijakan dan proses bisnis PKH perlu terus dilakukan secara berkala dan berkelanjutan agar informasi yang disampaikan selalu mutakhir. Selain itu, pemanfaatan media sosial dan media komunikasi lainnya perlu dioptimalkan untuk menjangkau masyarakat yang lebih luas.", "penutup": "Demikian laporan kegiatan sosialisasi kebijakan dan proses bisnis Program Keluarga Harapan (PKH) ini disusun sebagai bentuk pertanggungjawaban pelaksanaan tugas. Diharapkan kegiatan ini dapat mendukung kelancaran pelaksanaan PKH serta meningkatkan sinergi dan pemahaman seluruh pihak terkait.", "editable_kegiatan": false}, {"rhk_no": 8, "rhk_title": "Terlaksananya direktif pimpinan sesuai dengan penugasan ;  program Kementrian Sosial)", "ra_index": 3, "ra_title": "Mengikuti Rapat Koordinasi,Sosialisasi Kebijakan Proses Bisnis PKH dan Penguatan Kapasitas SDM.", "sub_title": "1. Rapat Koordinasi", "umum": "Rapat koordinasi merupakan sarana penting dalam mendukung kelancaran pelaksanaan Program Keluarga Harapan (PKH). Melalui rapat koordinasi, berbagai pihak yang terlibat dalam pelaksanaan program dapat menyamakan persepsi, menyampaikan informasi, serta membahas permasalahan dan rencana tindak lanjut guna meningkatkan efektivitas dan kualitas pelaksanaan PKH di lapangan.", "maksud_tujuan": "Kegiatan rapat koordinasi ini dimaksudkan untuk memperkuat komunikasi dan kerja sama antar pihak terkait dalam pelaksanaan Program Keluarga Harapan. Tujuan kegiatan ini adalah untuk membahas perkembangan pelaksanaan program, mengidentifikasi permasalahan yang dihadapi, serta merumuskan langkah-langkah tindak lanjut yang diperlukan.", "ruang_lingkup": "Ruang lingkup laporan ini meliputi pelaksanaan kegiatan rapat koordinasi Program Keluarga Harapan", "dasar": "Kegiatan ini dilaksanakan berdasarkan:\na.\tRencana Hasil Kerja (RHK) ASN PPPK Dit. PSNK terkait koordinasi pelaksanaan PKH.\nb.\tSalah satu proses bisnis PKH yang harus dilaksanakan oleh ASN PPPK Dit. PSNK\nc.\tKebutuhan koordinasi antar pemangku kepentingan dalam pelaksanaan PKH.", "kegiatan": "Kegiatan rapat koordinasi dilaksanakan melalui pertemuan yang membahas berbagai hal terkait pelaksanaan Program Keluarga Harapan. Dalam rapat ini disampaikan informasi mengenai perkembangan pelaksanaan program, evaluasi kegiatan yang telah dilakukan, serta pembahasan permasalahan yang ditemui di lapangan. Selain itu, dilakukan diskusi dan pertukaran informasi antar peserta untuk merumuskan kesepakatan dan rencana tindak lanjut guna meningkatkan koordinasi dan sinergi dalam pelaksanaan PKH. Adapun notulensi rapat terlampir.", "hasil": "1. Terlaksananya koordinasi antar pihak terkait dalam pelaksanaan PKH.\n\n2. Teridentifikasinya permasalahan dan kendala yang dihadapi di lapangan.\n\n3. Tersusunnya kesepakatan dan rencana tindak lanjut hasil rapat koordinasi.\n\n4. Meningkatnya sinergi dan komunikasi antar pemangku kepentingan.", "simpulan": "Kegiatan rapat koordinasi Program Keluarga Harapan telah dilaksanakan dengan baik dan memberikan ruang komunikasi yang efektif antar pihak terkait. Melalui rapat koordinasi ini, berbagai permasalahan dapat dibahas bersama dan dirumuskan langkah tindak lanjut untuk mendukung kelancaran pelaksanaan program.", "saran": "Rapat koordinasi perlu dilaksanakan secara rutin dan terjadwal agar koordinasi antar pihak terkait tetap terjaga. Selain itu, hasil rapat perlu ditindaklanjuti secara konsisten agar kesepakatan yang telah dibuat dapat dilaksanakan secara optimal.", "penutup": "Demikian laporan kegiatan rapat koordinasi Program Keluarga Harapan (PKH) ini disusun sebagai bentuk pertanggungjawaban pelaksanaan tugas. Diharapkan kegiatan ini dapat memperkuat koordinasi, sinergi, dan kualitas pelaksanaan Program Keluarga Harapan.", "editable_kegiatan": false}, {"rhk_no": 8, "rhk_title": "Terlaksananya direktif pimpinan sesuai dengan penugasan ;  program Kementrian Sosial)", "ra_index": 4, "ra_title": "Mengikuti Rapat Koordinasi,Sosialisasi Kebijakan Proses Bisnis PKH dan Penguatan Kapasitas SDM.", "sub_title": "2. Penguatan Kapasitas SDM", "umum": "Penguatan kapasitas sumber daya manusia (SDM) merupakan upaya penting dalam mendukung keberhasilan pelaksanaan Program Keluarga Harapan (PKH). SDM yang memiliki pemahaman, keterampilan, dan sikap kerja yang baik akan berkontribusi pada peningkatan kualitas layanan serta efektivitas pelaksanaan program di lapangan. Oleh karena itu, kegiatan penguatan kapasitas SDM perlu dilaksanakan secara berkelanjutan dan terarah.", "maksud_tujuan": "Kegiatan penguatan kapasitas SDM ini dimaksudkan untuk meningkatkan pengetahuan, keterampilan, dan pemahaman SDM yang terlibat dalam pelaksanaan PKH. Tujuan kegiatan ini adalah untuk mendukung peningkatan kompetensi, profesionalisme, serta kesiapan SDM dalam menjalankan tugas dan tanggung jawabnya.", "ruang_lingkup": "Ruang lingkup laporan ini meliputi pelaksanaan kegiatan penguatan kapasitas SDM Program Keluarga Harapan", "dasar": "Kegiatan ini dilaksanakan berdasarkan:\na.\tRencana Hasil Kerja (RHK) ASN PPPK Dit. PSNK terkait penguatan kapasitas SDM.\nb.\tSalah satu kegiatan yang harus dilaksanakan oleh ASN PPPK Dit. PSNK\nc.\tKebutuhan peningkatan kompetensi SDM dalam pelaksanaan program.", "kegiatan": "Kegiatan penguatan kapasitas SDM dilaksanakan melalui kegiatan berupa ……………………………………  Dalam kegiatan ini disampaikan materi dan praktik yang berkaitan dengan ……………………………………, sesuai dengan kebutuhan peningkatan kompetensi SDM. Pelaksanaan kegiatan dilakukan secara partisipatif agar peserta dapat memahami materi dengan baik dan mampu menerapkannya dalam pelaksanaan tugas sehari-hari.", "hasil": "1. Meningkatnya pengetahuan dan pemahaman SDM terkait pelaksanaan Program PKH.\n\n2. Bertambahnya keterampilan SDM sesuai dengan jenis penguatan kapasitas yang diberikan.\n\n3. Meningkatnya kesiapan dan profesionalisme SDM dalam menjalankan tugas.\n\n4. Terbangunnya kesadaran SDM akan pentingnya peningkatan kapasitas secara berkelanjutan.", "simpulan": "Kegiatan penguatan kapasitas SDM telah dilaksanakan dengan baik dan memberikan kontribusi positif terhadap peningkatan kompetensi SDM yang terlibat dalam pelaksanaan Program Keluarga Harapan. Melalui kegiatan ini, SDM memperoleh tambahan pengetahuan dan keterampilan yang mendukung pelaksanaan tugas secara lebih optimal.", "saran": "Kegiatan penguatan kapasitas SDM perlu dilaksanakan secara berkelanjutan dan disesuaikan dengan kebutuhan di lapangan. Selain itu, variasi metode dan bentuk kegiatan perlu dipertimbangkan agar proses peningkatan kapasitas dapat berjalan lebih efektif.", "penutup": "Demikian laporan kegiatan penguatan kapasitas Sumber Daya Manusia (SDM) ini disusun sebagai bentuk pertanggungjawaban pelaksanaan tugas. Diharapkan kegiatan ini dapat mendukung peningkatan kualitas pelaksanaan Program Keluarga Harapan secara berkelanjutan.", "editable_kegiatan": false}, {"rhk_no": 9, "rhk_title": "Terlaksananya Penyebaran Berita Baik Kementrian Sosial", "ra_index": 1, "ra_title": "Berperan aktif dalam memanfaatkan, menggunakan, melibatkan dan menyebarkan Media Sosial untuk menyampaikan semua program di Kementerian Sosial", "sub_title": "", "umum": "Pemanfaatan media sosial menjadi salah satu sarana strategis dalam menyampaikan informasi program-program Kementerian Sosial kepada masyarakat. Media sosial memungkinkan penyebaran informasi yang cepat, luas, dan mudah diakses oleh berbagai lapisan masyarakat. Oleh karena itu, keterlibatan aktif dalam memanfaatkan dan menyebarluaskan informasi melalui media sosial merupakan bagian penting dalam mendukung transparansi, akuntabilitas, serta peningkatan pemahaman masyarakat terhadap program-program Kementerian Sosial.", "maksud_tujuan": "Kegiatan ini dimaksudkan untuk memanfaatkan media sosial sebagai media informasi dan edukasi dalam menyampaikan berbagai program Kementerian Sosial. Tujuan kegiatan ini adalah untuk meningkatkan jangkauan informasi, memperkuat pemahaman masyarakat, serta mendorong partisipasi dan dukungan masyarakat terhadap pelaksanaan program-program Kementerian Sosial.", "ruang_lingkup": "Ruang lingkup laporan ini meliputi kegiatan pemanfaatan, penggunaan, pelibatan, dan penyebarluasan informasi melalui media sosial terkait program-program Kementerian Sosial", "dasar": "Kegiatan ini dilaksanakan berdasarkan:\na.\tRencana Hasil Kerja (RHK) ASN PPPK Dit. PSNK terkait penyebarn berita baik.\nb.\tSalah satu kegiatan yang harus dilaksanakan oleh ASN PPPK Dit. PSNK\nc.\tKebutuhan penyampaian informasi program sosial kepada masyarakat secara luas.", "kegiatan": "Kegiatan ini dilaksanakan dengan berperan aktif dalam memanfaatkan dan menggunakan media sosial sebagai sarana penyampaian informasi program-program Kementerian Sosial. Aktivitas yang dilakukan meliputi pembuatan dan penyebaran konten informatif, edukatif, dan persuasif mengenai kebijakan, program, serta layanan Kementerian Sosial. Selain itu, dilakukan pelibatan masyarakat melalui interaksi di media sosial, seperti menanggapi pertanyaan, memberikan klarifikasi informasi, serta menyebarkan kembali informasi resmi agar dapat menjangkau masyarakat yang lebih luas.", "hasil": "1. Tersebarluasnya informasi program-program Kementerian Sosial melalui media sosial.\n\n2. Meningkatnya pemahaman masyarakat terhadap program dan layanan Kementerian Sosial.\n\n3. Terbangunnya komunikasi dan interaksi yang lebih baik antara pemerintah dan masyarakat.\n\n4. Meningkatnya partisipasi dan dukungan masyarakat terhadap program sosial.", "simpulan": "Kegiatan pemanfaatan media sosial dalam penyebarluasan informasi program Kementerian Sosial telah dilaksanakan dengan baik dan memberikan kontribusi positif dalam meningkatkan jangkauan serta efektivitas penyampaian informasi kepada masyarakat.", "saran": "Pemanfaatan media sosial perlu terus dioptimalkan dengan penyajian konten yang menarik, informatif, dan mudah dipahami. Selain itu, konsistensi dalam penyebaran informasi serta koordinasi dengan sumber informasi resmi perlu dijaga agar informasi yang disampaikan tetap akurat dan terpercaya.", "penutup": "Demikian laporan kegiatan pemanfaatan media sosial dalam penyebarluasan informasi program Kementerian Sosial ini disusun sebagai bentuk pertanggungjawaban pelaksanaan tugas. Diharapkan kegiatan ini dapat mendukung keterbukaan informasi publik serta meningkatkan pemahaman masyarakat terhadap program-program Kementerian Sosial.", "editable_kegiatan": false}];

var reportPhotos={}, rhk4Edits={}, checkedReports=new Set(), curFotoTarget=null;
var p2k2={kelurahan:'',kecamatan:'Banyuates',topik:''};
var graduasi={nama:'',nik:'',alamat:'',kelurahan:''};
var suratGraduasi=null;
var ppseRows=[];
var graduasiRows=[];

function init(){
  REPORTS.forEach(function(rpt,idx){
    reportPhotos[idx]=[];
    if(rpt.editable_kegiatan) rhk4Edits[idx]=rpt.kegiatan;
  });
  buildReportList();
}

function buildReportList(){
  var list=document.getElementById('reportList');
  var currentRHK=null;
  REPORTS.forEach(function(rpt,idx){
    if(rpt.rhk_no!==currentRHK){
      currentRHK=rpt.rhk_no;
      var sep=document.createElement('div');
      sep.className='rhk-group';
      if(idx>0) sep.style.marginTop='12px';
      var title=rpt.rhk_title;
      if(title.length>85) title=title.substring(0,85)+'...';
      sep.textContent='RHK '+currentRHK+': '+title;
      list.appendChild(sep);
    }
    var sub=rpt.sub_title?' \u2014 '+rpt.sub_title:'';
    var shortRA=rpt.ra_title;
    if(shortRA.length>55) shortRA=shortRA.substring(0,55)+'...';

    var card=document.createElement('div');
    card.className='report-card';
    card.id='rcard_'+idx;

    var headerDiv=document.createElement('div');
    headerDiv.className='report-header';
    headerDiv.onclick=function(){toggleReport(idx)};

    var chkbox=document.createElement('input');
    chkbox.type='checkbox';
    chkbox.id='chk_'+idx;
    chkbox.style.flexShrink='0';
    chkbox.onclick=function(e){e.stopPropagation();toggleCheck(idx)};

    var tag=document.createElement('span');
    tag.className='report-tag';
    tag.textContent='RA'+rpt.ra_index;

    var nameSpan=document.createElement('span');
    nameSpan.className='report-name';
    nameSpan.textContent=shortRA+sub;

    var chev=document.createElement('span');
    chev.className='report-chevron';
    chev.id='chev_'+idx;
    chev.innerHTML='&#9660;';

    headerDiv.appendChild(chkbox);
    headerDiv.appendChild(tag);
    headerDiv.appendChild(nameSpan);
    headerDiv.appendChild(chev);

    var bodyDiv=document.createElement('div');
    bodyDiv.className='report-body';
    bodyDiv.id='rbody_'+idx;

    var bodyHTML='';
    if(rpt.editable_kegiatan && idx!==7 && idx!==8){
      bodyHTML+='<div class="rhk4-edit"><h4>&#9998; B. Kegiatan yang Dilaksanakan (edit setiap bulan)</h4>';
      bodyHTML+='<textarea id="rhk4_'+idx+'" oninput="rhk4Edits['+idx+']=this.value">'+escHtml(rpt.kegiatan)+'</textarea></div>';
    }
    if(rpt.rhk_no===2){
      bodyHTML+='<div class="rhk4-edit"><h4>&#9998; Input P2K2 (isi setiap bulan)</h4>';
      bodyHTML+='<div class="row" style="gap:8px;margin-bottom:8px">';
      bodyHTML+='<div class="col"><label>Kelurahan</label><input type="text" id="p2k2_kel" placeholder="Nama Kelurahan" oninput="p2k2.kelurahan=this.value"></div>';
      bodyHTML+='<div class="col"><label>Kecamatan</label><input type="text" id="p2k2_kec" value="Banyuates" oninput="p2k2.kecamatan=this.value"></div>';
      bodyHTML+='</div>';
      bodyHTML+='<label>Topik P2K2</label><input type="text" id="p2k2_topik" placeholder="cth: Pengasuhan Anak, Kesehatan Ibu Hamil, dll" oninput="p2k2.topik=this.value">';
      bodyHTML+='</div>';
    }
    if(idx===7){
      bodyHTML+='<div class="rhk4-edit"><h4>&#9998; Data KPM Graduasi (Surat Pernyataan)</h4>';
      bodyHTML+='<div class="row" style="gap:8px;margin-bottom:8px">';
      bodyHTML+='<div class="col"><label>Nama KPM</label><input type="text" id="grad_nama" placeholder="Nama lengkap KPM" oninput="graduasi.nama=this.value"></div>';
      bodyHTML+='<div class="col"><label>NIK</label><input type="text" id="grad_nik" placeholder="NIK KPM" oninput="graduasi.nik=this.value"></div>';
      bodyHTML+='</div><div class="row" style="gap:8px">';
      bodyHTML+='<div class="col"><label>Alamat</label><input type="text" id="grad_alamat" placeholder="Alamat KPM" oninput="graduasi.alamat=this.value"></div>';
      bodyHTML+='<div class="col"><label>Kelurahan</label><input type="text" id="grad_kel" placeholder="Kelurahan" oninput="graduasi.kelurahan=this.value"></div>';
      bodyHTML+='</div>';
      bodyHTML+='<div style="margin-top:10px"><label>Upload Surat Pernyataan Graduasi (foto/scan)</label>';
      bodyHTML+='<div id="suratPreview" style="margin-top:6px"></div>';
      bodyHTML+='<div style="display:flex;gap:8px;margin-top:6px">';
      bodyHTML+='<button class="btn-outline" onclick="document.getElementById(\'suratInput\').click()" style="font-size:11px;padding:5px 12px">&#128206; Pilih File</button>';
      bodyHTML+='<button class="btn-outline" onclick="clearSurat()" style="font-size:11px;padding:5px 12px;color:#e74c3c;border-color:#e74c3c;display:none" id="btnClearSurat">Hapus</button>';
      bodyHTML+='</div>';
      bodyHTML+='<input type="file" id="suratInput" accept="image/*,.pdf" style="display:none" onchange="handleSurat(this)">';
      bodyHTML+='</div></div>';
    }
    if(idx===8){
      bodyHTML+='<div class="rhk4-edit"><h4>&#9998; Data Usulan Graduasi</h4>';
      bodyHTML+='<table style="width:100%;border-collapse:collapse;font-size:12px;margin-bottom:8px" id="gradTableEl">';
      bodyHTML+='<tr style="background:var(--accent);color:#fff"><th style="padding:6px;border:1px solid #ccc;width:36px">No</th><th style="padding:6px;border:1px solid #ccc">Nama</th><th style="padding:6px;border:1px solid #ccc">NIK</th><th style="padding:6px;border:1px solid #ccc">Alamat</th><th style="padding:6px;border:1px solid #ccc;width:30px"></th></tr>';
      bodyHTML+='</table>';
      bodyHTML+='<button class="btn-outline" onclick="addGradRow()" style="font-size:11px;padding:5px 12px">+ Tambah Baris</button>';
      bodyHTML+='</div>';
    }
    if(idx===9){
      bodyHTML+='<div class="rhk4-edit"><h4>&#9998; Data Asesmen KPM Program PPSE</h4>';
      bodyHTML+='<div id="ppseTable"><table style="width:100%;border-collapse:collapse;font-size:12px;margin-bottom:8px" id="ppseTableEl">';
      bodyHTML+='<tr style="background:var(--accent);color:#fff"><th style="padding:6px;border:1px solid #ccc;width:36px">No</th><th style="padding:6px;border:1px solid #ccc">Nama</th><th style="padding:6px;border:1px solid #ccc">NIK</th><th style="padding:6px;border:1px solid #ccc">Alamat</th><th style="padding:6px;border:1px solid #ccc;width:30px"></th></tr>';
      bodyHTML+='</table></div>';
      bodyHTML+='<button class="btn-outline" onclick="addPpseRow()" style="font-size:11px;padding:5px 12px">+ Tambah Baris</button>';
      bodyHTML+='</div>';
    }
    bodyHTML+='<div class="foto-label">Dokumentasi Kegiatan</div>';
    bodyHTML+='<div id="fotoWrap_'+idx+'" style="display:flex;flex-wrap:wrap;gap:6px;margin:8px 0"></div>';
    bodyHTML+='<button class="btn-outline" onclick="addFotoSlot('+idx+')" style="font-size:11px;padding:5px 12px;margin-bottom:6px">+ Tambah Foto</button>';
    bodyHTML+='<div style="margin-top:8px;display:flex;align-items:center;gap:10px">';
    bodyHTML+='<button class="btn-gen" id="btn_'+idx+'" onclick="generateOne('+idx+')">&#128196; Generate PDF</button>';
    bodyHTML+='<span class="status-msg" id="stat_'+idx+'"></span></div>';
    bodyDiv.innerHTML=bodyHTML;

    card.appendChild(headerDiv);
    card.appendChild(bodyDiv);
    list.appendChild(card);
  });
}

function escHtml(t){
  var d=document.createElement('div');d.textContent=t;return d.innerHTML;
}

function addPpseRow(){
  var no=ppseRows.length+1;
  ppseRows.push({nama:'',nik:'',alamat:''});
  var tbl=document.getElementById('ppseTableEl');
  var tr=document.createElement('tr');
  var i=ppseRows.length-1;
  tr.id='ppseRow_'+i;
  tr.innerHTML='<td style="padding:4px 6px;border:1px solid #ccc;text-align:center">'+no+'</td>'
    +'<td style="padding:2px;border:1px solid #ccc"><input type="text" style="width:100%;border:none;padding:4px;font-size:12px" placeholder="Nama" oninput="ppseRows['+i+'].nama=this.value"></td>'
