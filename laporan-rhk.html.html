function applyP2K2(text){
  var kel=p2k2.kelurahan||'\u2026\u2026\u2026\u2026\u2026\u2026\u2026\u2026';
  var kec=p2k2.kecamatan||'\u2026\u2026\u2026\u2026\u2026\u2026\u2026\u2026';
  var top=p2k2.topik||'\u2026\u2026\u2026\u2026\u2026\u2026\u2026\u2026\u2026\u2026\u2026\u2026\u2026\u2026\u2026';
  text=text.replace(/Kelurahan\s*[\u2026\.]+/g,'Kelurahan '+kel);
  text=text.replace(/Kecamatan\s*[\u2026\.]+/g,'Kecamatan '+kec);
  text=text.replace(/topik:\s*[\u2026\.]+/g,'topik: '+top);
  return text;
}

function getKegiatan(idx){
  var rpt=REPORTS[idx];
  var keg=(rhk4Edits[idx]!==undefined)?rhk4Edits[idx]:rpt.kegiatan;
  if(rpt.rhk_no===2) keg=applyP2K2(keg);
  if(idx===7){
    var n=graduasi.nama||'......................';
    var k=graduasi.nik||'......................';
    var a=graduasi.alamat||'......................';
    var l=graduasi.kelurahan||'......................';
    keg=keg.replace(/Nama\s*:/,'Nama : '+n);
    keg=keg.replace(/NIK\s*:/,'NIK : '+k);
    keg=keg.replace(/Alamat\s*:/,'Alamat : '+a);
    keg=keg.replace(/Kelurahan\s*:/,'Kelurahan : '+l);
  }
  return keg;
}

function generateOne(idx){
  var btn=document.getElementById('btn_'+idx);
  var stat=document.getElementById('stat_'+idx);
  var inp=getInputs();
  if(!inp.nama){stat.textContent='\u26a0 Nama belum diisi';return}
  btn.disabled=true;stat.textContent='Generating...';
  loadImg(KOP_B64).then(function(kopImg){
    var rpt=REPORTS[idx];
    var keg=getKegiatan(idx);
    var photos=reportPhotos[idx]||[null,null,null,null];
    var blob=makePDF(rpt,keg,photos,kopImg,inp,idx);
    downloadBlob(blob,pdfName(rpt,inp));
    btn.disabled=false;btn.classList.add('done');btn.innerHTML='&#9989; Selesai';
    stat.textContent='';
    setTimeout(function(){btn.classList.remove('done');btn.innerHTML='&#128196; Generate PDF'},2500);
  }).catch(function(e){btn.disabled=false;stat.textContent='Error: '+e.message});
}

function generateBatch(){
  var inp=getInputs();
  if(!inp.nama){document.getElementById('batchStatus').textContent='\u26a0 Nama belum diisi';return}
  var indices=Array.from(checkedReports).sort(function(a,b){return a-b});
  if(!indices.length) return;
  var btn=document.getElementById('btnBatch');
  var bar=document.getElementById('batchBar');
  var fill=document.getElementById('batchFill');
  var stat=document.getElementById('batchStatus');
  btn.disabled=true;bar.style.display='block';fill.style.width='0%';

  loadImg(KOP_B64).then(function(kopImg){
    var i=0;
    function next(){
      if(i>=indices.length){
        stat.textContent='\u2705 Selesai! '+indices.length+' PDF telah didownload.';
        btn.disabled=false;
        return;
      }
      var idx=indices[i];
      var rpt=REPORTS[idx];
      var keg=getKegiatan(idx);
      stat.textContent='Generating '+(i+1)+'/'+indices.length+': RHK'+rpt.rhk_no+' RA'+rpt.ra_index+'...';
      fill.style.width=Math.round(((i+1)/indices.length)*100)+'%';
      var blob=makePDF(rpt,keg,reportPhotos[idx]||[null,null,null,null],kopImg,inp,idx);
      downloadBlob(blob,pdfName(rpt,inp));
      i++;
      setTimeout(next,400);
    }
    next();
  });
}

function pdfName(rpt,inp){
  var sub=rpt.sub_title?'_'+rpt.sub_title.replace(/[^a-zA-Z0-9]/g,'_').substring(0,25):'';
  return 'RHK'+rpt.rhk_no+'_RA'+rpt.ra_index+sub+'_'+inp.bulan+'_'+inp.tahun+'.pdf';
}
function downloadBlob(blob,name){
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  setTimeout(function(){URL.revokeObjectURL(a.href)},5000);
}
function loadImg(src){return new Promise(function(resolve){var i=new Image();i.onload=function(){resolve(i)};i.src=src})}

// =============================================
// PDF GENERATION - F4 paper (215.9 x 330.2 mm)
// =============================================
function makePDF(rpt,kegiatan,photos,kopImg,inp,idx){
  var jsPDF=window.jspdf.jsPDF;
  var PW=215.9, PH=330.2;
  var doc=new jsPDF({unit:'mm',format:[PW,PH]});

  var ML=25, MR=20;
  var CW=PW-ML-MR;
  var kopAspect=kopImg.height/kopImg.width;
  var kopW=CW, kopH=kopW*kopAspect;
  var MT_KOP=10;
  var contentStart=MT_KOP+kopH+8;
  var maxY=PH-22;
  var LH=5, PGAP=2;

  var y=contentStart, pg=1;

  function addKop(){doc.addImage(kopImg,'JPEG',ML,MT_KOP,kopW,kopH)}
  function addFooter(){
    doc.setDrawColor(44,62,80);doc.setLineWidth(0.3);
    doc.line(ML,PH-16,PW-MR,PH-16);
    doc.setFontSize(7.5);doc.setFont('helvetica','normal');doc.setTextColor(100);
    doc.text('Laporan Pelaksanaan Kegiatan \u2014 Program Keluarga Harapan (PKH)',PW/2,PH-12,{align:'center'});
    doc.text('Hal. '+pg,PW-MR,PH-12,{align:'right'});
    doc.setTextColor(0);
  }
  function newPage(){addFooter();doc.addPage([PW,PH]);pg++;addKop();y=contentStart}
  function need(h){if(y+h>maxY) newPage()}

  function hline(ly,w){doc.setDrawColor(26,82,118);doc.setLineWidth(w||0.6);doc.line(ML,ly,PW-MR,ly)}

  function sectionTitle(txt){
    need(14);y+=6;
    doc.setFont('helvetica','bold');doc.setFontSize(11);
    doc.text(txt,ML,y);y+=7;
  }
  function subTitle(txt){
    need(10);y+=4;
    doc.setFont('helvetica','bold');doc.setFontSize(10);
    doc.text(txt,ML+5,y);y+=6;
  }

  function para(txt){
    if(!txt) return;
    doc.setFont('helvetica','normal');doc.setFontSize(10);
    var blocks=txt.split('\n');
    for(var b=0;b<blocks.length;b++){
      var blk=blocks[b].replace(/\t/g,'  ').trim();
      if(!blk) continue;
      var lines=doc.splitTextToSize(blk,CW-12);
      for(var i=0;i<lines.length;i++){
        need(LH);
        doc.text(lines[i], ML+10, y);
        y+=LH;
      }
      y+=PGAP;
    }
  }

  function listPara(txt){
    if(!txt) return;
    doc.setFont('helvetica','normal');doc.setFontSize(10);
    var blocks=txt.split('\n');
    for(var b=0;b<blocks.length;b++){
      var blk=blocks[b].replace(/\t/g,'  ').trim();
      if(!blk) continue;
      var isList=(/^[a-g]\./.test(blk))||(/^\d+[\.\)]/.test(blk));
      var xPos=isList?ML+10:ML+10;
      var lines=doc.splitTextToSize(blk,CW-12);
      for(var i=0;i<lines.length;i++){
        need(LH);
        doc.text(lines[i],i===0?xPos:xPos+4,y);
        y+=LH;
      }
      y+=PGAP;
    }
  }

  // ── BUILD PDF ──
  addKop();

  y+=2;
  doc.setFont('helvetica','bold');doc.setFontSize(14);
  doc.text('LAPORAN PELAKSANAAN KEGIATAN',PW/2,y,{align:'center'});
  y+=6;hline(y,1);y+=7;

  // Info rows
  doc.setFontSize(10);
  doc.setFont('helvetica','bold');
  doc.text('RHK',ML,y);doc.text(':',ML+32,y);
  doc.setFont('helvetica','normal');
  var rl=doc.splitTextToSize(rpt.rhk_title,CW-35);
  for(var i=0;i<rl.length;i++){doc.text(rl[i],ML+35,y);y+=LH}
  y+=1;

  doc.setFont('helvetica','bold');
  doc.text('Rencana Aksi',ML,y);doc.text(':',ML+32,y);
  doc.setFont('helvetica','normal');
  var dispTitle=rpt.sub_title?rpt.ra_title+' \u2014 '+rpt.sub_title:rpt.ra_title;
  var al=doc.splitTextToSize(dispTitle,CW-35);
  for(var i=0;i<al.length;i++){doc.text(al[i],ML+35,y);y+=LH}
  y+=2;hline(y,1);y+=6;

  sectionTitle('A.   PENDAHULUAN');
  subTitle('1.   Umum');para(rpt.umum);
  subTitle('2.   Maksud dan Tujuan');para(rpt.maksud_tujuan);
  subTitle('3.   Ruang Lingkup');para(rpt.ruang_lingkup);
  subTitle('4.   Dasar');listPara(rpt.dasar);

  sectionTitle('B.   KEGIATAN YANG DILAKSANAKAN');
  para(kegiatan);

  sectionTitle('C.   HASIL YANG DICAPAI');
  listPara(rpt.hasil);

  sectionTitle('D.   SIMPULAN DAN SARAN');
  subTitle('1.   Simpulan');para(rpt.simpulan);
  subTitle('2.   Saran');para(rpt.saran);

  sectionTitle('E.   PENUTUP');
  para(rpt.penutup);

  // Signature
  need(60);y+=12;
  var tglStr=inp.tanggal?inp.tanggal+' '+inp.bulan+' '+inp.tahun:'........................ '+inp.tahun;
  var sigX=PW/2+20;
  doc.setFont('helvetica','normal');doc.setFontSize(10);
  doc.text('Sampang, '+tglStr,sigX,y,{align:'center'});y+=5;
  doc.text('Pendamping PKH',sigX,y,{align:'center'});y+=5;
  doc.text('Kecamatan Banyuates',sigX,y,{align:'center'});y+=25;
  doc.setFont('helvetica','bold');
  doc.text(inp.nama,sigX,y,{align:'center'});
  var nW=doc.getTextWidth(inp.nama);
  doc.setDrawColor(0);doc.setLineWidth(0.4);
  doc.line(sigX-nW/2,y+0.8,sigX+nW/2,y+0.8);
  if(inp.nip){
    y+=5;doc.setFont('helvetica','normal');doc.setFontSize(9);
    doc.text('NIP. '+inp.nip,sigX,y,{align:'center'});
  }
  addFooter();

  function drawDataTable(dc,rows,headers){
    var colW=[12,50,45,CW-107];
    var colX=[ML];for(var c=1;c<4;c++) colX.push(colX[c-1]+colW[c-1]);
    var rowH=7;
    dc.setFillColor(26,82,118);dc.setTextColor(255);
    dc.rect(ML,y,CW,rowH,'F');
    dc.setFont('helvetica','bold');dc.setFontSize(9);
    for(var c=0;c<4;c++) dc.text(headers[c],colX[c]+colW[c]/2,y+rowH/2+1,{align:'center'});
    dc.setTextColor(0);y+=rowH;
    dc.setFont('helvetica','normal');dc.setFontSize(9);
    for(var r=0;r<rows.length;r++){
      if(y+rowH>maxY-10){addFooter();dc.addPage([PW,PH]);pg++;addKop();y=contentStart}
      if(r%2===0){dc.setFillColor(240,245,250);dc.rect(ML,y,CW,rowH,'F')}
      dc.setDrawColor(200);dc.setLineWidth(0.2);dc.rect(ML,y,CW,rowH,'S');
      for(var c=0;c<3;c++) dc.line(colX[c+1],y,colX[c+1],y+rowH);
      var vals=[''+(r+1),rows[r].nama||'',rows[r].nik||'',rows[r].alamat||''];
      dc.text(vals[0],colX[0]+colW[0]/2,y+rowH/2+1,{align:'center'});
      for(var c=1;c<4;c++){
        var txt=vals[c];
        if(dc.getTextWidth(txt)>colW[c]-4) txt=txt.substring(0,Math.floor((colW[c]-8)/4.5))+'..';
        dc.text(txt,colX[c]+2,y+rowH/2+1);
      }
      y+=rowH;
    }
    dc.setDrawColor(26,82,118);dc.setLineWidth(0.5);dc.line(ML,y,ML+CW,y);
    y+=6;dc.setFont('helvetica','italic');dc.setFontSize(8);dc.setTextColor(100);
    dc.text('Total: '+rows.length+' KPM',ML,y);dc.setTextColor(0);
  }

  // ── SURAT PERNYATAAN GRADUASI (RHK4 RA1 only) ──
  if(idx===7 && suratGraduasi){
    newPage();
    y=contentStart+2;
    doc.setFont('helvetica','bold');doc.setFontSize(12);
    doc.text('SURAT PERNYATAAN GRADUASI MANDIRI',PW/2,y,{align:'center'});
    y+=5;hline(y,1);y+=8;
    try{
      var imgW=CW-20;
      var imgH=imgW*1.35;
      if(y+imgH>maxY-5) imgH=maxY-y-5;
      doc.addImage(suratGraduasi,'JPEG',ML+10,y,imgW,imgH);
    }catch(e){
      doc.setFont('helvetica','italic');doc.setFontSize(10);doc.setTextColor(150);
      doc.text('(File surat pernyataan tidak dapat ditampilkan)',PW/2,y+20,{align:'center'});
      doc.setTextColor(0);
    }
    addFooter();
  }

  // ── GRADUASI TABLE (RHK4 RA2 only) ──
  if(idx===8 && graduasiRows.length>0){
    newPage();y=contentStart+2;
    doc.setFont('helvetica','bold');doc.setFontSize(12);
    doc.text('DATA USULAN GRADUASI',PW/2,y,{align:'center'});
    y+=5;hline(y,1);y+=8;
    drawDataTable(doc,graduasiRows,['No','Nama','NIK','Alamat']);
    addFooter();
  }

  // ── PPSE DATA TABLE (RHK4 RA3 only) ──
  if(idx===9 && ppseRows.length>0){
    newPage();y=contentStart+2;
    doc.setFont('helvetica','bold');doc.setFontSize(12);
    doc.text('DATA ASESMEN KPM PROGRAM PPSE',PW/2,y,{align:'center'});
    y+=5;hline(y,1);y+=8;
    drawDataTable(doc,ppseRows,['No','Nama','NIK','Alamat']);
    addFooter();
  }

  // ── DOKUMENTASI (1 kolom, fleksibel) ──
  var activePhotos=photos.filter(function(p){return p!==null&&p!==undefined});
  newPage();
  y=contentStart+2;
  doc.setFont('helvetica','bold');doc.setFontSize(14);
  doc.text('DOKUMENTASI KEGIATAN',PW/2,y,{align:'center'});
  y+=5;hline(y,1);y+=8;

  if(activePhotos.length===0){
    doc.setFont('helvetica','italic');doc.setFontSize(10);doc.setTextColor(150);
    doc.text('(Belum ada foto dokumentasi)',PW/2,y+20,{align:'center'});
    doc.setTextColor(0);
  }else{
    var phW=CW-20;
    var phH=phW*0.55;
    for(var p=0;p<activePhotos.length;p++){
      var neededH=phH+18;
      if(y+neededH>maxY){addFooter();doc.addPage([PW,PH]);pg++;addKop();y=contentStart}
      doc.setFont('helvetica','bold');doc.setFontSize(9);
      doc.text('Foto '+(p+1),ML+10,y);
      y+=4;
      try{doc.addImage(activePhotos[p],'JPEG',ML+10,y,phW,phH)}catch(e){
        doc.setDrawColor(180);doc.setFillColor(250,250,250);doc.rect(ML+10,y,phW,phH,'FD');
      }
      y+=phH+3;
      doc.setFont('helvetica','italic');doc.setFontSize(8);doc.setTextColor(100);
      doc.text('Keterangan: ..................................................................',ML+10,y);
      doc.setTextColor(0);
      y+=10;
    }
  }
  addFooter();

  return doc.output('blob');
}

init();
</script>
</body>
</html>
